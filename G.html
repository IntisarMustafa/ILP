<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المنصات الطائرة - التحدي التفاعلي مع الرياضيات</title>
    <!-- استدعاء الخطوط والأيقونات -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- مكتبة الرياضيات MathLive -->
    <script src="https://unpkg.com/mathlive"></script>
    
    <style>
        /* ========================================= */
        /* المتغيرات والألوان الأساسية للعبة         */
        /* ========================================= */
        :root {
            --primary: #4cc9f0;
            --primary-dark: #4361ee;
            --secondary: #7209b7;
            --bg-color: #0f1429;
            --text-light: #f1faee;
            --success: #2ecc71;
            --danger: #e74c3c;
            
            /* ألوان لوحة الرياضيات */
            --word-blue: #2b579a;
            --math-bg: #f3f2f1;
            --key-bg: #ffffff;
            --key-hover: #e1dfdd;
            --action-bg: #adb5bd;
            --kb-bg: #d1d4d9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', 'Segoe UI', sans-serif; }
        
        body { 
            background: radial-gradient(circle at top left, #1a2a6c, #1d3557, var(--bg-color)); 
            color: var(--text-light); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            overflow: hidden; 
        }

        /* ========================================= */
        /* الشاشات والبطاقات                       */
        /* ========================================= */
        .screen {
            display: none; width: 100%; max-width: 900px; padding: 20px;
            flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; position: relative; z-index: 10;
        }
        .screen.active { display: flex; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: rgba(29, 53, 87, 0.95); padding: 40px; border-radius: 20px;
            box-shadow: 0 0 40px rgba(76, 201, 240, 0.3); width: 100%; max-width: 600px; text-align: center;
            border: 1px solid rgba(76, 201, 240, 0.3);
        }

        h1, h2 { color: var(--primary); margin-bottom: 25px; text-shadow: 0 0 15px rgba(76, 201, 240, 0.5); }
        
        /* ========================================= */
        /* الأزرار والمدخلات                       */
        /* ========================================= */
        .btn {
            background: linear-gradient(45deg, var(--primary-dark), var(--secondary)); color: white;
            border: none; padding: 15px 30px; font-size: 1.2rem; border-radius: 50px; cursor: pointer;
            transition: all 0.3s; margin: 10px; font-weight: bold; width: 100%;
            box-shadow: 0 5px 15px rgba(67, 97, 238, 0.4);
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(67, 97, 238, 0.6); }
        
        input[type="text"], input[type="number"] {
            width: 100%; padding: 15px; margin-bottom: 15px;
            border: 2px solid rgba(76, 201, 240, 0.5); border-radius: 10px;
            background: rgba(0, 0, 0, 0.3); color: white; font-size: 1.1rem; text-align: center;
        }
        input:focus { outline: none; border-color: var(--primary); background: rgba(0,0,0,0.5); }

        .math-display { direction: ltr; display: inline-block; text-align: left; }

        /* ========================================= */
        /* واجهة اللعبة - المنصات الطائرة           */
        /* ========================================= */
        #game-container { 
            width: 100%; max-width: 900px; height: 80vh; max-height: 600px; 
            position: relative; border-radius: 20px; overflow: hidden; 
            border: 2px solid var(--primary); display: none;
            background: linear-gradient(to bottom, #1d3557, #0f1429);
        }
        .ground { position: absolute; bottom: 0; width: 100%; height: 50px; background: #1a2a6c; border-top: 3px solid var(--primary); }
        
        /* تصميم شخصية اللاعب */
        .player {
            position: absolute; width: 40px; height: 40px; 
            background: linear-gradient(135deg, var(--primary), var(--success));
            border-radius: 8px; left: 50px; bottom: 50px;
            box-shadow: 0 0 15px rgba(76, 201, 240, 0.8);
            transition: transform 0.1s;
        }
        
        /* تصميم العقبات */
        .obstacle {
            position: absolute; width: 30px; height: 40px; bottom: 50px;
            background: linear-gradient(to bottom, var(--danger), #b71540);
            border-radius: 5px; box-shadow: 0 0 15px rgba(231, 76, 60, 0.8);
        }

        /* نافذة الأسئلة المنبثقة أثناء اللعب */
        #question-modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 20, 41, 0.95); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; padding: 20px;
        }
        .ans-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 500px; margin-top: 20px; }
        .ans-btn {
            background: rgba(67, 97, 238, 0.2); border: 2px solid var(--primary);
            color: white; padding: 20px; border-radius: 12px; cursor: pointer; font-size: 1.2rem;
            transition: all 0.2s; font-weight: bold;
        }
        .ans-btn:hover { background: var(--primary); color: #000; }

        /* شاشة التحميل */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 20, 41, 0.9); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 999;
        }
        .spinner {
            border: 5px solid rgba(76, 201, 240, 0.3); border-top: 5px solid var(--primary);
            border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ========================================= */
        /* لوحة بناء الأسئلة (المعلم)               */
        /* ========================================= */
        .q-block { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .opt-row { display: flex; gap: 10px; margin-bottom: 5px; align-items: center; }
        .opt-row input[type="radio"] { width: 20px; height: 20px; cursor: pointer;}
        
        /* زر فتح الحاسبة الرياضية */
        .math-trigger-btn { 
            background: var(--primary-dark); color: white; border: none; border-radius: 8px; 
            padding: 0 15px; cursor: pointer; font-size: 20px; display: flex; 
            align-items: center; justify-content: center; transition: 0.2s; height: 50px;
        }
        .math-trigger-btn:hover { background: var(--primary); }

        /* ========================================= */
        /* ستايل لوحة الرياضيات (المحرر المنبثق)    */
        /* ========================================= */
        #math-modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 99999; align-items: center; justify-content: center;
            backdrop-filter: blur(5px);
        }

        .math-modal-content {
            width: 95%; max-width: 800px; background: var(--math-bg);
            border-radius: 12px; display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); border: 1px solid #d2d2d2; color: #000;
        }

        .math-header {
            background-color: var(--word-blue); color: white; padding: 15px;
            font-weight: 600; font-size: 1.1rem; display: flex; justify-content: space-between; align-items: center;
        }
        
        .math-close-btn {
            background: var(--success); color: white; border: none; padding: 8px 15px;
            border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px;
        }

        .math-editor-container { padding: 20px 10px; display: flex; justify-content: center; background: white;}

        math-field {
            font-size: 1.8rem; width: 100%; min-height: 100px;
            border: 2px solid var(--word-blue); padding: 10px;
            border-radius: 8px; background: #fff; outline: none;
        }

        .math-keyboard-wrapper { background: var(--kb-bg); border-top: 1px solid #bbb; }
        .math-keyboard-tabs { display: flex; background: #e9ecef; border-bottom: 1px solid #ccc; overflow-x: auto; }
        
        .math-tab {
            flex: 1; min-width: 80px; padding: 12px 5px; text-align: center;
            font-size: 0.95rem; cursor: pointer; color: #555; transition: 0.2s; white-space: nowrap; font-weight: bold;
        }
        .math-tab.active { background: white; color: var(--word-blue); border-bottom: 3px solid var(--word-blue);}

        .custom-keyboard {
            padding: 5px; display: none; flex-direction: column; gap: 5px;
            user-select: none; max-height: 320px; overflow-y: auto;
        }
        .custom-keyboard.active { display: flex; }

        .kb-row { display: flex; justify-content: center; gap: 4px; width: 100%; }
        
        .key {
            background: var(--key-bg); border: none; border-bottom: 2px solid #999;
            border-radius: 5px; height: 45px; flex: 1; min-width: 35px; max-width: 60px;
            font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: #333; touch-action: manipulation; font-weight: bold;
        }
        .key:active { background: var(--key-hover); transform: translateY(1px); border-bottom-width: 1px; }
        .key.action { background: var(--action-bg); color: white; font-size: 1rem; max-width: none; }
        .key.num { background: #f8f9fa; border-color: #bbb; }
        .key.space { flex: 5; max-width: none; background: #f8f9fa; font-size: 1rem; color: #444; }

        /* أيقونات الرياضيات داخل الأزرار */
        .math-icon { display: inline-flex; align-items: center; justify-content: center; font-family: 'Times New Roman', serif; font-style: italic; pointer-events: none; }
        .frac-icon { flex-direction: column; font-size: 0.75em; line-height: 1.1; }
        .frac-icon .line { border-top: 1px solid #333; width: 12px; margin: 1px 0; }
        .root-icon { align-items: center; }
        .root-icon .radicand { border-top: 1.2px solid #333; padding-top: 1px; margin-left: 1px; }
    </style>
</head>
<body>

<!-- شاشة التحميل -->
<div id="loading-screen">
    <div class="spinner"></div>
    <h3 id="loading-text" style="margin-top: 15px;">جاري المعالجة...</h3>
</div>

<!-- الشاشة الرئيسية -->
<div class="screen active" id="screen-home">
    <div class="card">
        <h1>🚀 المنصات الطائرة</h1>
        <p style="margin-bottom: 20px; font-size: 1.2rem;">تجاوز العقبات وأجب عن الأسئلة لجمع النقاط!</p>
        <button class="btn" onclick="showScreen('screen-teacher-setup')"><i class="fas fa-chalkboard-teacher"></i> دخول المعلم (إعداد غرفة)</button>
        <button class="btn" onclick="showScreen('screen-student-login')" style="background: linear-gradient(45deg, #e74c3c, #c0392b);"><i class="fas fa-user-graduate"></i> دخول الطالب</button>
    </div>
</div>

<!-- شاشة إعداد المعلم -->
<div class="screen" id="screen-teacher-setup">
    <div class="card" style="max-width: 800px; max-height: 90vh; overflow-y: auto;">
        <h2>📝 إعداد أسئلة التحدي</h2>
        
        <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; margin-bottom: 20px;">
            <h3 style="color: var(--primary); font-size: 1.1rem; margin-bottom: 10px;">استرداد غرفة سابقة</h3>
            <div style="display: flex; gap: 10px;">
                <input type="number" id="existing-room-pin" placeholder="أدخل رقم الغرفة (PIN)" style="margin-bottom: 0;">
                <button class="btn" onclick="loadExistingRoom()" style="margin: 0; width: auto; white-space: nowrap;">فتح الغرفة</button>
            </div>
        </div>

        <div id="questions-list"></div>
        <button class="btn" onclick="addQuestionBlock()" style="background: transparent; border: 2px dashed var(--primary);">+ إضافة سؤال جديد</button>
        
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button class="btn" onclick="saveQuestionsToSheet()">💾 حفظ وإنشاء الغرفة</button>
            <button class="btn" onclick="showScreen('screen-home')" style="background: #555;">إلغاء</button>
        </div>
    </div>
</div>

<!-- شاشة غرفة المعلم (الانتظار) -->
<div class="screen" id="screen-teacher-lobby">
    <div class="card">
        <h2>رقم الغرفة (PIN):</h2>
        <h1 id="display-room-pin" style="font-size: 4rem; letter-spacing: 5px;">000000</h1>
        <p>شارك هذا الرقم مع الطلاب للدخول للعبة.</p>
        <div id="qr-container" style="margin: 20px 0; background: white; padding: 10px; display: inline-block; border-radius: 10px;">
            <img id="room-qr-code" src="" alt="QR Code" style="width: 200px; height: 200px; display: none;">
        </div>
        <button class="btn" onclick="showScreen('screen-home')" style="background: #555; max-width: 200px;">إغلاق</button>
    </div>
</div>

<!-- شاشة دخول الطالب -->
<div class="screen" id="screen-student-login">
    <div class="card">
        <h2>انضم للتحدي 🎮</h2>
        <input type="number" id="input-room-pin" placeholder="أدخل رقم الغرفة (PIN)">
        <input type="text" id="input-student-name" placeholder="اسمك">
        <button class="btn" onclick="startStudentFlow()">🚀 ابدأ اللعب</button>
        <button class="btn" onclick="showScreen('screen-home')" style="background: #555;">رجوع</button>
    </div>
</div>

<!-- حاوية اللعبة -->
<div id="game-container">
    <div class="game-info" style="position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; z-index: 20;">
        <span style="font-weight: bold; font-size: 1.2rem;">النقاط: <span id="scoreDisplay">0</span></span>
        <span style="font-weight: bold; font-size: 1.2rem;" id="playerNameDisplay">الطالب</span>
    </div>
    
    <!-- اللاعب والعقبات -->
    <div id="player" class="player"></div>
    <div id="obstacles-container"></div>
    <div class="ground"></div>

    <!-- نافذة السؤال أثناء اللعب -->
    <div id="question-modal">
        <h2 id="q-text" class="math-display" style="color: white; font-size: 2.5rem; text-align: center; width: 100%;">السؤال هنا</h2>
        <div class="ans-grid">
            <button class="ans-btn math-display" onclick="checkAnswer(0)" id="ans-0"></button>
            <button class="ans-btn math-display" onclick="checkAnswer(1)" id="ans-1"></button>
            <button class="ans-btn math-display" onclick="checkAnswer(2)" id="ans-2"></button>
            <button class="ans-btn math-display" onclick="checkAnswer(3)" id="ans-3"></button>
        </div>
    </div>
</div>

<!-- ========================================== -->
<!-- نافذة محرر الرياضيات الشامل (بكامل الخصائص)-->
<!-- ========================================== -->
<div id="math-modal-overlay">
    <div class="math-modal-content">
        <div class="math-header">
            <span>📝 محرر الرياضيات الشامل</span>
            <button class="math-close-btn" onclick="closeMathModal()">✓ إدراج وحفظ</button>
        </div>
        <div class="math-editor-container">
            <!-- حقل الكتابة الخاص بمكتبة MathLive -->
            <math-field id="formula" virtual-keyboard-policy="manual"></math-field>
        </div>
        <div class="math-keyboard-wrapper">
            <!-- تبويبات لوحة المفاتيح -->
            <div class="math-keyboard-tabs">
                <div class="math-tab active" onclick="showMathTab('math_combined', event)">الأرقام والرموز</div>
                <div class="math-tab" onclick="showMathTab('letters', event)">عربي</div>
                <div class="math-tab" onclick="showMathTab('english', event)">English</div>
            </div>
            
            <!-- لوحة الأرقام والرموز الرياضية -->
            <div class="custom-keyboard active" id="math_combined">
                <div class="kb-row">
                    <button class="key num" onpointerdown="addMath('1', event)">1</button>
                    <button class="key num" onpointerdown="addMath('2', event)">2</button>
                    <button class="key num" onpointerdown="addMath('3', event)">3</button>
                    <button class="key num" onpointerdown="addMath('4', event)">4</button>
                    <button class="key num" onpointerdown="addMath('5', event)">5</button>
                    <button class="key num" onpointerdown="addMath('6', event)">6</button>
                    <button class="key num" onpointerdown="addMath('7', event)">7</button>
                    <button class="key num" onpointerdown="addMath('8', event)">8</button>
                    <button class="key num" onpointerdown="addMath('9', event)">9</button>
                    <button class="key num" onpointerdown="addMath('0', event)">0</button>
                </div>
                <div class="kb-row">
                    <button class="key action" onpointerdown="addMath('+', event)">+</button>
                    <button class="key action" onpointerdown="addMath('-', event)">-</button>
                    <button class="key action" onpointerdown="addMath('\\times', event)">×</button>
                    <button class="key action" onpointerdown="addMath('\\div', event)">÷</button>
                    <button class="key action" onpointerdown="addMath('=', event)">=</button>
                    <button class="key" onpointerdown="addMath('.', event)">.</button>
                    <button class="key" onpointerdown="insertMathCode('<', event)">&lt;</button>
                    <button class="key" onpointerdown="insertMathCode('>', event)">&gt;</button>
                    <button class="key action" onpointerdown="backspaceMath(event)" style="flex:2">⌫ حذف</button>
                </div>
                <div class="kb-row">
                    <button class="key" onpointerdown="insertMathCode('\\frac{#@}{#?}', event)"><span class="math-icon frac-icon"><span>a</span><span class="line"></span><span>b</span></span></button>
                    <button class="key" onpointerdown="insertMathCode('^{#?}', event)"><span class="math-icon">x<sup style="font-size:0.7em;">n</sup></span></button>
                    <button class="key" onpointerdown="insertMathCode('\\sqrt{#?}', event)"><span class="math-icon root-icon"><span>√</span><span class="radicand">x</span></span></button>
                    <button class="key" onpointerdown="insertMathCode('\\sqrt[#?]{#?}', event)"><span class="math-icon root-icon"><sup style="font-size:0.5em; font-style:normal;">n</sup><span>√</span><span class="radicand">x</span></span></button>
                    <button class="key" onpointerdown="insertMathCode('\\le', event)">≤</button>
                    <button class="key" onpointerdown="insertMathCode('\\ge', event)">≥</button>
                    <button class="key" onpointerdown="insertMathCode('\\neq', event)">≠</button>
                    <button class="key" onpointerdown="insertMathCode('\\approx', event)">≈</button>
                </div>
                <div class="kb-row">
                    <button class="key" onpointerdown="insertMathCode('^\\circ', event)">°</button>
                    <button class="key" onpointerdown="insertMathCode('\\angle', event)">∠</button>
                    <button class="key" onpointerdown="insertMathCode('\\pi', event)">π</button>
                    <button class="key" onpointerdown="insertMathCode('\\infty', event)">∞</button>
                    <button class="key" onpointerdown="insertMathCode('\\Delta', event)">Δ</button>
                    <button class="key" onpointerdown="insertMathCode('\\pm', event)">±</button>
                    <button class="key" onpointerdown="insertMathCode('\\{', event)">{</button>
                    <button class="key" onpointerdown="insertMathCode('\\}', event)">}</button>
                    <button class="key" onpointerdown="insertMathCode('(', event)">(</button>
                    <button class="key" onpointerdown="insertMathCode(')', event)">)</button>
                </div>
                <div class="kb-row">
                    <button class="key" onpointerdown="insertMathCode('\\sin', event)">sin</button>
                    <button class="key" onpointerdown="insertMathCode('\\cos', event)">cos</button>
                    <button class="key" onpointerdown="insertMathCode('\\tan', event)">tan</button>
                    <button class="key" onpointerdown="insertMathCode('\\theta', event)">θ</button>
                    <button class="key" onpointerdown="insertMathCode('\\alpha', event)">α</button>
                    <button class="key" onpointerdown="insertMathCode('\\int', event)">∫</button>
                    <button class="key" onpointerdown="insertMathCode('\\sum', event)">Σ</button>
                    <button class="key space" onpointerdown="addMathSpace(event)">مسافة</button>
                </div>
            </div>
            
            <!-- لوحة الحروف العربية -->
            <div class="custom-keyboard" id="letters">
                <div class="kb-row">
                    <button class="key" onpointerdown="addMath('ض', event)">ض</button>
                    <button class="key" onpointerdown="addMath('ص', event)">ص</button>
                    <button class="key" onpointerdown="addMath('ث', event)">ث</button>
                    <button class="key" onpointerdown="addMath('ق', event)">ق</button>
                    <button class="key" onpointerdown="addMath('ف', event)">ف</button>
                    <button class="key" onpointerdown="addMath('غ', event)">غ</button>
                    <button class="key" onpointerdown="addMath('ع', event)">ع</button>
                    <button class="key" onpointerdown="addMath('ه', event)">ه</button>
                    <button class="key" onpointerdown="addMath('خ', event)">خ</button>
                    <button class="key" onpointerdown="addMath('ح', event)">ح</button>
                    <button class="key" onpointerdown="addMath('ج', event)">ج</button>
                </div>
                <div class="kb-row">
                    <button class="key" onpointerdown="addMath('ش', event)">ش</button>
                    <button class="key" onpointerdown="addMath('س', event)">س</button>
                    <button class="key" onpointerdown="addMath('ي', event)">ي</button>
                    <button class="key" onpointerdown="addMath('ب', event)">ب</button>
                    <button class="key" onpointerdown="addMath('ل', event)">ل</button>
                    <button class="key" onpointerdown="addMath('ا', event)">ا</button>
                    <button class="key" onpointerdown="addMath('ت', event)">ت</button>
                    <button class="key" onpointerdown="addMath('ن', event)">ن</button>
                    <button class="key" onpointerdown="addMath('م', event)">م</button>
                    <button class="key" onpointerdown="addMath('ك', event)">ك</button>
                    <button class="key" onpointerdown="addMath('ط', event)">ط</button>
                </div>
                <div class="kb-row">
                    <button class="key" onpointerdown="addMath('ئ', event)">ئ</button>
                    <button class="key" onpointerdown="addMath('ء', event)">ء</button>
                    <button class="key" onpointerdown="addMath('ؤ', event)">ؤ</button>
                    <button class="key" onpointerdown="addMath('ر', event)">ر</button>
                    <button class="key" onpointerdown="addMath('ى', event)">ى</button>
                    <button class="key" onpointerdown="addMath('ة', event)">ة</button>
                    <button class="key" onpointerdown="addMath('و', event)">و</button>
                    <button class="key" onpointerdown="addMath('ز', event)">ز</button>
                    <button class="key" onpointerdown="addMath('ظ', event)">ظ</button>
                    <button class="key" onpointerdown="addMath('د', event)">د</button>
                    <button class="key" onpointerdown="addMath('ذ', event)">ذ</button>
                </div>
                <div class="kb-row">
                    <button class="key" onpointerdown="addMath('أ', event)">أ</button>
                    <button class="key" onpointerdown="addMath('إ', event)">إ</button>
                    <button class="key" onpointerdown="addMath('آ', event)">آ</button>
                    <button class="key" onpointerdown="addMath('؟', event)">؟</button>
                    <button class="key space" onpointerdown="addMathSpace(event)">مسافة</button>
                    <button class="key action" onpointerdown="backspaceMath(event)" style="flex:2">⌫ حذف</button>
                </div>
            </div>
            
            <!-- لوحة الحروف الإنجليزية -->
            <div class="custom-keyboard" id="english">
                <div class="kb-row">
                    <button class="key" onpointerdown="addMath('q', event)">q</button>
                    <button class="key" onpointerdown="addMath('w', event)">w</button>
                    <button class="key" onpointerdown="addMath('e', event)">e</button>
                    <button class="key" onpointerdown="addMath('r', event)">r</button>
                    <button class="key" onpointerdown="addMath('t', event)">t</button>
                    <button class="key" onpointerdown="addMath('y', event)">y</button>
                    <button class="key" onpointerdown="addMath('u', event)">u</button>
                    <button class="key" onpointerdown="addMath('i', event)">i</button>
                    <button class="key" onpointerdown="addMath('o', event)">o</button>
                    <button class="key" onpointerdown="addMath('p', event)">p</button>
                </div>
                <div class="kb-row">
                    <button class="key" onpointerdown="addMath('a', event)">a</button>
                    <button class="key" onpointerdown="addMath('s', event)">s</button>
                    <button class="key" onpointerdown="addMath('d', event)">d</button>
                    <button class="key" onpointerdown="addMath('f', event)">f</button>
                    <button class="key" onpointerdown="addMath('g', event)">g</button>
                    <button class="key" onpointerdown="addMath('h', event)">h</button>
                    <button class="key" onpointerdown="addMath('j', event)">j</button>
                    <button class="key" onpointerdown="addMath('k', event)">k</button>
                    <button class="key" onpointerdown="addMath('l', event)">l</button>
                </div>
                <div class="kb-row">
                    <button class="key" onpointerdown="addMath('z', event)">z</button>
                    <button class="key" onpointerdown="addMath('x', event)">x</button>
                    <button class="key" onpointerdown="addMath('c', event)">c</button>
                    <button class="key" onpointerdown="addMath('v', event)">v</button>
                    <button class="key" onpointerdown="addMath('b', event)">b</button>
                    <button class="key" onpointerdown="addMath('n', event)">n</button>
                    <button class="key" onpointerdown="addMath('m', event)">m</button>
                    <button class="key action" onpointerdown="backspaceMath(event)" style="flex:2">⌫</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- النماذج المخفية للاتصال بـ Google Sheets -->
<iframe id="hidden_iframe" name="hidden_iframe" onload="handleSheetLoad()" style="display:none;"></iframe>
<form id="dbForm" action="https://script.google.com/macros/s/AKfycby1lNQRCcGugFzh1jbxnTBsuryUffTqf24UtxaCT4uS80UoRzpxxlvabS0tfxROPokRYg/exec" method="POST" target="hidden_iframe" style="display: none;">
    <input type="hidden" id="form-name" name="name">
    <input type="hidden" id="form-school" name="school">
    <input type="hidden" id="form-score" name="score"> 
</form>

<script>
    // ==========================================
    // 1. أكواد محرر الرياضيات المنبثق
    // ==========================================
    const mf = document.getElementById('formula');
    mf.smartMode = true; 
    let targetInputField = null; 

    // منع ظهور لوحة المفاتيح الافتراضية للجوال
    mf.addEventListener('focusin', (e) => {
        e.preventDefault();
        if (window.mathVirtualKeyboard) window.mathVirtualKeyboard.hide();
    });

    mf.addEventListener('keydown', (e) => {
        if (e.key === ' ') { e.preventDefault(); mf.insert('\\text{ }'); }
    });

    // دوال الأزرار
    function addMath(val, e) { if (e) e.preventDefault(); mf.focus(); mf.insert(val); }
    function insertMathCode(latex, e) { if (e) e.preventDefault(); mf.focus(); mf.insert(latex); }
    function addMathSpace(e) { if (e) e.preventDefault(); mf.focus(); mf.insert('\\text{ }'); }
    function backspaceMath(e) { if (e) e.preventDefault(); mf.focus(); mf.executeCommand('deleteBackward'); }

    // التبديل بين لوحات المفاتيح (أرقام، عربي، إنجليزي)
    function showMathTab(tabId, event) {
        document.querySelectorAll('.custom-keyboard').forEach(kb => kb.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        document.querySelectorAll('.math-tab').forEach(t => t.classList.remove('active'));
        if(event) event.currentTarget.classList.add('active');
    }

    // فتح وإغلاق محرر الرياضيات
    function openMathModal(inputElement) {
        targetInputField = inputElement;
        document.getElementById('math-modal-overlay').style.display = 'flex';
        mf.value = ''; // تصفير المحرر
        setTimeout(() => mf.focus(), 100);
    }

    function closeMathModal() {
        document.getElementById('math-modal-overlay').style.display = 'none';
        if (targetInputField) {
            // دمج النص المكتوب بصيغة الرياضيات
            targetInputField.value += " \\(" + mf.value + "\\) ";
            targetInputField = null;
        }
    }

    // ==========================================
    // 2. المتغيرات العامة ونظام الشاشات
    // ==========================================
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/1M-LkkAoNarQDN6_Hbb5ZGhs4vuD5cfhREKpZE-48_tg/gviz/tq?tqx=out:json";
    let gameQuestions = [];
    let currentQIndex = 0;
    let studentScore = 0;
    let currentRoomPIN = "";
    let qBlockCount = 0;
    let formActionType = ""; 

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('game-container').style.display = 'none';
        if (id) document.getElementById(id).classList.add('active');
    }

    function toggleLoading(show, text = 'جاري المعالجة...') {
        document.getElementById('loading-text').innerText = text;
        document.getElementById('loading-screen').style.display = show ? 'flex' : 'none';
    }

    // ==========================================
    // 3. نظام المعلم وإعداد الأسئلة
    // ==========================================
    function addQuestionBlock() {
        const container = document.getElementById('questions-list');
        const id = qBlockCount++;
        // لاحظ إضافة زر 🧮 لفتح لوحة الرياضيات بجانب كل حقل
        container.insertAdjacentHTML('beforeend', `
            <div class="q-block" id="q-${id}">
                <div style="display:flex; gap:10px; margin-bottom:10px;">
                    <input type="text" class="q-title math-display" placeholder="اكتب السؤال هنا..." required style="margin-bottom:0;">
                    <button class="math-trigger-btn" onclick="openMathModal(this.previousElementSibling)" title="إضافة رياضيات">🧮</button>
                </div>
                <div class="opt-row">
                    <input type="radio" name="ans-${id}" value="0" checked>
                    <input type="text" class="q-opt math-display" placeholder="الخيار الأول" required style="margin-bottom:0; width:100%;">
                    <button class="math-trigger-btn" onclick="openMathModal(this.previousElementSibling)">🧮</button>
                </div>
                <div class="opt-row">
                    <input type="radio" name="ans-${id}" value="1">
                    <input type="text" class="q-opt math-display" placeholder="الخيار الثاني" required style="margin-bottom:0; width:100%;">
                    <button class="math-trigger-btn" onclick="openMathModal(this.previousElementSibling)">🧮</button>
                </div>
                <div class="opt-row">
                    <input type="radio" name="ans-${id}" value="2">
                    <input type="text" class="q-opt math-display" placeholder="الخيار الثالث" required style="margin-bottom:0; width:100%;">
                    <button class="math-trigger-btn" onclick="openMathModal(this.previousElementSibling)">🧮</button>
                </div>
                <div class="opt-row">
                    <input type="radio" name="ans-${id}" value="3">
                    <input type="text" class="q-opt math-display" placeholder="الخيار الرابع" required style="margin-bottom:0; width:100%;">
                    <button class="math-trigger-btn" onclick="openMathModal(this.previousElementSibling)">🧮</button>
                </div>
            </div>
        `);
    }

    window.onload = () => addQuestionBlock(); // إنشاء أول سؤال تلقائياً

    function saveQuestionsToSheet() {
        const blocks = document.querySelectorAll('.q-block');
        let questions = [];
        blocks.forEach(block => {
            const q = block.querySelector('.q-title').value;
            const opts = Array.from(block.querySelectorAll('.q-opt')).map(inp => inp.value);
            const ans = parseInt(block.querySelector('input[type="radio"]:checked').value);
            if(q && opts.every(o => o !== "")) questions.push({q, opts, ans});
        });

        if (questions.length === 0) return alert("يرجى إدخال سؤال واحد على الأقل بخيارات كاملة.");

        currentRoomPIN = Math.floor(100000 + Math.random() * 900000).toString();
        document.getElementById('form-name').value = currentRoomPIN;
        document.getElementById('form-school').value = JSON.stringify(questions);
        document.getElementById('form-score').value = "QUESTIONS";
        formActionType = 'SAVE_Q';

        toggleLoading(true, 'جاري إنشاء الغرفة وحفظ الأسئلة...');
        document.getElementById('dbForm').submit();
    }

    async function loadExistingRoom() {
        const pin = document.getElementById('existing-room-pin').value.trim();
        if (!pin) return alert("أدخل رقم الغرفة!");
        
        toggleLoading(true, 'جاري البحث عن الغرفة...');
        try {
            const res = await fetch(SHEET_URL);
            const text = await res.text();
            const json = JSON.parse(text.substring(47, text.length - 2));
            const rows = json.table.rows;
            
            let found = false;
            for(let i = rows.length - 1; i >= 0; i--) {
                if(rows[i]?.c[0]?.v?.toString() === pin && rows[i]?.c[1]?.v?.toString().startsWith('[')) {
                    found = true;
                    currentRoomPIN = pin;
                    break;
                }
            }
            toggleLoading(false);
            if (found) setupTeacherLobby(pin);
            else alert("لم يتم العثور على الغرفة!");
        } catch (e) {
            toggleLoading(false); alert("حدث خطأ في الاتصال بقاعدة البيانات.");
        }
    }

    function setupTeacherLobby(pin) {
        document.getElementById('display-room-pin').innerText = pin;
        const gameUrl = `${window.location.href.split('?')[0]}?pin=${pin}`;
        const qrImg = document.getElementById('room-qr-code');
        qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(gameUrl)}&color=4cc9f0`;
        qrImg.style.display = 'block';
        showScreen('screen-teacher-lobby');
    }

    function handleSheetLoad() {
        if (!formActionType) return;
        toggleLoading(false);
        if (formActionType === 'SAVE_Q') {
            setupTeacherLobby(currentRoomPIN);
        } else if (formActionType === 'SAVE_SCORE') {
            alert("تم حفظ نتيجتك بنجاح!");
            showScreen('screen-home');
        }
        formActionType = "";
    }

    // ==========================================
    // 4. نظام الطالب ومحرك اللعبة (Game Engine)
    // ==========================================
    async function startStudentFlow() {
        const pin = document.getElementById('input-room-pin').value.trim();
        const name = document.getElementById('input-student-name').value.trim();
        if (!pin || !name) return alert("أدخل بياناتك كاملة!");

        document.getElementById('playerNameDisplay').innerText = name;
        toggleLoading(true, 'جاري جلب الأسئلة...');

        try {
            const res = await fetch(SHEET_URL);
            const text = await res.text();
            const json = JSON.parse(text.substring(47, text.length - 2));
            const rows = json.table.rows;
            
            let questionsData = null;
            for(let i = rows.length - 1; i >= 0; i--) {
                if(rows[i]?.c[0]?.v?.toString() === pin && rows[i]?.c[1]?.v?.toString().startsWith('[')) {
                    questionsData = JSON.parse(rows[i].c[1].v);
                    break;
                }
            }

            toggleLoading(false);
            if (questionsData) {
                gameQuestions = questionsData;
                currentQIndex = 0;
                studentScore = 0;
                document.getElementById('scoreDisplay').innerText = '0';
                startGameEngine();
            } else {
                alert("رقم الغرفة غير صحيح!");
            }
        } catch (e) {
            toggleLoading(false); alert("خطأ في الاتصال بالشبكة.");
        }
    }

    // متغيرات المحرك الفيزيائي للعبة
    let gameLoopId;
    let lastTime = 0;
    let isPlaying = false;
    let playerY = 50;
    let velocityY = 0;
    let gravity = 0.002; 
    let jumpForce = -0.8;
    let isGrounded = true;
    let obstacles = [];
    let speedMult = 0.35; 
    let nextObstacleTime = 0;

    function startGameEngine() {
        showScreen(null); 
        const container = document.getElementById('game-container');
        container.style.display = 'block';
        
        // تصفير اللعبة
        playerY = 50; velocityY = 0; isGrounded = true; obstacles = [];
        document.getElementById('obstacles-container').innerHTML = '';
        updatePlayerPos();
        
        isPlaying = true;
        lastTime = performance.now();
        nextObstacleTime = lastTime + 1500; 
        requestAnimationFrame(gameLoop);

        // القفز بالماوس، اللمس، أو المسافة
        container.onmousedown = container.ontouchstart = jump;
        window.onkeydown = (e) => { if(e.code === 'Space' || e.code === 'ArrowUp') jump(); };
    }

    function jump() {
        if (isGrounded && isPlaying) {
            velocityY = jumpForce;
            isGrounded = false;
        }
    }

    function updatePlayerPos() {
        const p = document.getElementById('player');
        p.style.bottom = `${playerY}px`;
    }

    function createObstacle() {
        const id = 'obs-' + Date.now();
        // جعل العقبة تظهر خارج الشاشة من اليمين
        const obs = { id: id, x: window.innerWidth > 900 ? 900 : window.innerWidth, passed: false };
        obstacles.push(obs);
        const el = document.createElement('div');
        el.className = 'obstacle';
        el.id = id;
        el.style.left = `${obs.x}px`;
        document.getElementById('obstacles-container').appendChild(el);
    }

    function gameLoop(timestamp) {
        if (!isPlaying) return;
        
        const deltaTime = timestamp - lastTime;
        lastTime = timestamp;

        // تطبيق الجاذبية وحركة اللاعب
        velocityY += gravity * deltaTime;
        playerY -= velocityY * deltaTime; 
        
        if (playerY <= 50) { 
            playerY = 50;
            velocityY = 0;
            isGrounded = true;
        }
        updatePlayerPos();

        // توليد العقبات في أوقات عشوائية
        if (timestamp > nextObstacleTime) {
            createObstacle();
            nextObstacleTime = timestamp + 1500 + Math.random() * 2000;
        }

        // تحريك العقبات واختبار الاصطدام
        for (let i = obstacles.length - 1; i >= 0; i--) {
            let obs = obstacles[i];
            obs.x -= speedMult * deltaTime;
            
            let obsElement = document.getElementById(obs.id);
            if (obsElement) {
                obsElement.style.left = `${obs.x}px`;
            }

            // اختبار الاصطدام (الشخصية تقع بين إحداثيات العقبة)
            if (obs.x < 90 && obs.x > 10 && playerY < 90 && !obs.passed) {
                // اصطدام! إيقاف اللعبة وإظهار السؤال
                isPlaying = false;
                obs.passed = true;
                showQuestion();
            } else if (obs.x < 10 && !obs.passed) {
                // تجاوز العقبة بنجاح
                studentScore += 10;
                document.getElementById('scoreDisplay').innerText = studentScore;
                obs.passed = true;
            }

            // حذف العقبات التي خرجت من الشاشة
            if (obs.x < -50) {
                if (obsElement) obsElement.remove();
                obstacles.splice(i, 1);
            }
        }
        
        if (isPlaying) requestAnimationFrame(gameLoop);
    }

    // ==========================================
    // 5. نظام الأسئلة والنتيجة
    // ==========================================
    function showQuestion() {
        if (currentQIndex >= gameQuestions.length) {
            endGame(); return;
        }
        
        const modal = document.getElementById('question-modal');
        modal.style.display = 'flex';
        
        const q = gameQuestions[currentQIndex];
        
        // طباعة السؤال وتحويل رموز الرياضيات إن وجدت
        document.getElementById('q-text').textContent = q.q;
        MathLive.renderMathInElement(document.getElementById('q-text'));
        
        // طباعة الخيارات
        for(let i=0; i<4; i++) {
            const btn = document.getElementById(`ans-${i}`);
            btn.textContent = q.opts[i];
            MathLive.renderMathInElement(btn); // تحويل رموز الرياضيات داخل الخيارات
        }
    }

    function checkAnswer(idx) {
        const q = gameQuestions[currentQIndex];
        
        if (idx === q.ans) {
            studentScore += 50; // مكافأة الإجابة الصحيحة
            document.getElementById('scoreDisplay').innerText = studentScore;
            // يمكنك هنا إضافة صوت أو تأثيرات
        } else {
            alert("إجابة خاطئة! الإجابة الصحيحة: " + q.opts[q.ans]);
        }
        
        currentQIndex++;
        document.getElementById('question-modal').style.display = 'none';
        
        if (currentQIndex >= gameQuestions.length) {
            // انتهاء الأسئلة
            endGame();
        } else {
            // استئناف اللعبة
            lastTime = performance.now();
            isPlaying = true;
            requestAnimationFrame(gameLoop);
        }
    }

    function endGame() {
        isPlaying = false;
        alert(`انتهى التحدي! مجموع نقاطك هو: ${studentScore} 🏆`);
        
        // إرسال النتيجة إلى Google Sheets
        formActionType = 'SAVE_SCORE';
        document.getElementById('form-name').value = document.getElementById('input-student-name').value;
        document.getElementById('form-school').value = currentRoomPIN;
        document.getElementById('form-score').value = studentScore;
        
        toggleLoading(true, 'جاري حفظ نتيجتك المذهلة...');
        document.getElementById('dbForm').submit();
    }
</script>
</body>
