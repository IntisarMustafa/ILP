<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة مراقبة الغرف - الأونروا</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />
  <!-- STATS MODAL -->
<div class="modal-overlay" id="statsModal" onclick="closeModalOutside(event)">
  <div class="modal-box">
    <div class="modal-header">
      <h2 id="modalTitle">📊 إحصائيات المدارس والمعلمين</h2>
      <button class="modal-close" onclick="closeStatsModal()">✕ إغلاق</button>
    </div>
    <div class="modal-tabs">
      <button class="modal-tab active" id="tab-schools" onclick="switchTab('schools')">🏫 حسب المدارس</button>
      <button class="modal-tab" id="tab-teachers" onclick="switchTab('teachers')">👨‍🏫 حسب المعلمين</button>
    </div>
    <div class="modal-body" id="modalBody">
    </div>
  </div>
</div>

<script>
    window.MathJax = {
      tex: { inlineMath: [["\\(","\\)"], ["$","$"]], displayMath: [["$$","$$"]] },
      options: { skipHtmlTags: ["script","noscript","style","textarea"] },
      startup: { typeset: false }
    };
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-chtml.min.js" crossorigin="anonymous"></script>
  <style>
    :root {
      /* UNRWA Official Colors */
      --unrwa-blue:     #005B99;
      --unrwa-blue-dk:  #003F6B;
      --unrwa-blue-lt:  #0072BB;
      --unrwa-sky:      #E8F4FB;
      --unrwa-sky2:     #D0E9F7;
      --bg:             #F0F7FD;
      --surface:        #FFFFFF;
      --card:           #FFFFFF;
      --border:         #B8D9EE;
      --border-dk:      #7FB8DC;
      --accent:         #005B99;
      --accent2:        #0072BB;
      --accent3:        #E07B00;
      --green:          #1A8C5B;
      --green-lt:       #E8F7F0;
      --red:            #C0392B;
      --red-lt:         #FDECEA;
      --text:           #1A2E3D;
      --text2:          #3A5570;
      --muted:          #7A9BB5;
      --shadow:         0 2px 12px rgba(0,91,153,0.10);
      --shadow-hover:   0 6px 24px rgba(0,91,153,0.18);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Tajawal", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== TOP BAR ===== */
    .top-bar {
      background: var(--unrwa-blue-dk);
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .top-bar-title { display: flex; align-items: center; gap: 14px; }
    .unrwa-logo {
      background: white;
      color: var(--unrwa-blue-dk);
      font-size: 10px;
      font-weight: 900;
      padding: 4px 8px;
      border-radius: 4px;
      letter-spacing: 1px;
    }
    .top-bar-title h1 {
      font-size: 20px;
      font-weight: 900;
      color: white;
      letter-spacing: -0.3px;
    }
    .pulse-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #5DDFAA;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(93,223,170,0.6); }
      50%      { box-shadow: 0 0 0 7px rgba(93,223,170,0); }
    }
    .meta-info { display: flex; align-items: center; gap: 16px; font-size: 13px; color: rgba(255,255,255,0.75); }
    .meta-info strong { color: white; }
    .countdown { color: #89D9FF; font-variant-numeric: tabular-nums; }
    .refresh-btn {
      background: white;
      color: var(--unrwa-blue-dk);
      border: none;
      padding: 8px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-family: "Tajawal", sans-serif;
      font-size: 13px;
      font-weight: 700;
      transition: all 0.2s;
    }
    .refresh-btn:hover { background: var(--unrwa-sky); }
    .refresh-btn:active { transform: scale(0.97); }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* ===== BLUE STRIPE ===== */
    .blue-stripe {
      background: var(--unrwa-blue);
      height: 5px;
    }

    /* ===== STATS BAR ===== */
    .stats-bar {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 14px 32px;
      display: flex;
      gap: 12px;
      overflow-x: auto;
      box-shadow: var(--shadow);
    }
    .stat-chip {
      flex-shrink: 0;
      background: var(--unrwa-sky);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .stat-chip:hover { border-color: var(--unrwa-blue); box-shadow: var(--shadow-hover); transform: translateY(-1px); }
    .stat-chip.active {
      background: var(--unrwa-blue);
      border-color: var(--unrwa-blue-dk);
    }
    .stat-chip.active .label { color: rgba(255,255,255,0.8); }
    .stat-chip.active .value { color: white; }
    .stat-chip.active .icon { filter: brightness(10); }
    .stat-chip.green { background: var(--green-lt); border-color: #9ADBC3; }
    .stat-chip.green .value { color: var(--green); }
    .stat-chip.green:hover { border-color: var(--green); }
    .stat-chip.green.active { background: var(--green); border-color: #146B47; }
    .stat-chip.red { background: var(--red-lt); border-color: #F0B4AE; }
    .stat-chip.red .value { color: var(--red); }
    .stat-chip.red:hover { border-color: var(--red); }
    .stat-chip.red.active { background: var(--red); border-color: #992D22; }
    .stat-chip .icon { font-size: 20px; }
    .stat-chip .label { font-size: 11px; color: var(--muted); font-weight: 600; }
    .stat-chip .value { font-size: 22px; font-weight: 900; color: var(--unrwa-blue); }
    .filter-hint {
      font-size: 10px;
      color: var(--muted);
      margin-top: 1px;
      display: block;
    }
    .stat-chip.active .filter-hint { color: rgba(255,255,255,0.7); }

    /* ===== FILTER BADGE ===== */
    .filter-badge {
      background: var(--unrwa-blue);
      color: white;
      border-radius: 8px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 700;
      display: none;
      align-items: center;
      gap: 8px;
      margin: 14px 32px 0;
    }
    .filter-badge.show { display: flex; }
    .filter-badge button {
      background: rgba(255,255,255,0.25);
      border: none;
      color: white;
      border-radius: 4px;
      padding: 2px 8px;
      cursor: pointer;
      font-family: "Tajawal", sans-serif;
      font-size: 12px;
    }
    .filter-badge button:hover { background: rgba(255,255,255,0.4); }

    /* ===== MAIN ===== */
    .main { padding: 20px 32px 40px; }
    .section-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::after { content:""; flex:1; height:1px; background:var(--border); }

    .rooms-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 18px;
    }

    /* ===== ROOM CARD ===== */
    .room-card {
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: all 0.25s;
      animation: fadeIn 0.45s ease both;
    }
    .room-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
    .room-card.audited { border-color: #9ADBC3; border-width: 2px; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }

    .room-header {
      background: linear-gradient(135deg, var(--unrwa-blue-dk) 0%, var(--unrwa-blue) 100%);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .room-card.audited .room-header {
      background: linear-gradient(135deg, #0E5C3A 0%, var(--green) 100%);
    }
    .room-number { display: flex; align-items: center; gap: 10px; }
    .room-badge {
      background: rgba(255,255,255,0.2);
      border: 1.5px solid rgba(255,255,255,0.35);
      border-radius: 8px;
      padding: 4px 14px;
      font-size: 18px;
      font-weight: 900;
      color: white;
    }
    .room-label { font-size: 12px; color: rgba(255,255,255,0.75); }
    .student-count-badge {
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 12px;
      color: white;
      font-weight: 700;
    }

    /* Questions */
    .room-questions { padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .questions-label {
      font-size: 11px; color: var(--muted); font-weight: 700;
      letter-spacing: 1.2px; margin-bottom: 8px;
      display: flex; align-items: center; gap: 8px;
    }
    .q-count {
      background: var(--unrwa-sky2);
      color: var(--unrwa-blue);
      border-radius: 10px;
      padding: 1px 8px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid var(--border);
    }
    .toggle-q-btn {
      background: white;
      border: 1px solid var(--border);
      color: var(--unrwa-blue);
      border-radius: 5px;
      padding: 2px 10px;
      font-size: 11px;
      cursor: pointer;
      font-family: "Tajawal", sans-serif;
      font-weight: 700;
      margin-right: auto;
      transition: all 0.2s;
    }
    .toggle-q-btn:hover { background: var(--unrwa-sky); border-color: var(--unrwa-blue); }
    .questions-list { display: flex; flex-direction: column; gap: 10px; margin-top: 6px; }
    .q-card {
      background: var(--unrwa-sky);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 12px 14px;
    }
    .q-num { font-size: 10px; font-weight: 700; color: var(--unrwa-blue); letter-spacing: 1px; margin-bottom: 5px; }
    .q-text { font-size: 14px; color: var(--text); line-height: 1.8; font-family: "Cairo", sans-serif; margin-bottom: 10px; }
    .opts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .opt-item {
      display: flex; align-items: center; gap: 7px;
      background: white; border: 1px solid var(--border);
      border-radius: 7px; padding: 6px 10px;
      font-size: 13px; color: var(--text2);
      font-family: "Cairo", sans-serif; line-height: 1.5;
    }
    .opt-item.correct { background: var(--green-lt); border-color: #9ADBC3; color: #0E6644; }
    .opt-letter {
      font-size: 10px; font-weight: 900;
      width: 18px; height: 18px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; background: var(--unrwa-sky2); color: var(--unrwa-blue);
    }
    .opt-item.correct .opt-letter { background: #9ADBC3; color: #0E6644; }
    .questions-text { font-size: 14px; color: var(--text2); line-height: 1.7; font-family: "Cairo", sans-serif; white-space: pre-wrap; }

    /* Students */
    .room-students { padding: 12px 16px; }
    .students-label {
      font-size: 11px; color: var(--muted); font-weight: 700;
      letter-spacing: 1.2px; margin-bottom: 8px;
      display: flex; align-items: center; gap: 8px;
    }
    .students-list { display: flex; flex-direction: column; gap: 7px; }
    .student-row {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--unrwa-sky); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px; transition: background 0.2s;
    }
    .student-row:hover { background: var(--unrwa-sky2); }
    .student-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .student-score { display: flex; align-items: center; gap: 5px; font-size: 15px; font-weight: 900; color: var(--accent3); }
    .score-icon { font-size: 13px; }
    .student-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .date-badge {
      background: #FEF3E2; border: 1px solid #F5D08A;
      border-radius: 5px; padding: 1px 7px;
      font-size: 11px; color: #B45309;
    }
    .empty-room { padding: 14px 16px; color: var(--muted); font-size: 13px; font-style: italic; }

    /* ===== AUDIT BAR ===== */
    .audit-bar {
      padding: 11px 16px;
      border-top: 1px solid var(--border);
      background: #FAFCFF;
      display: flex; align-items: center; justify-content: space-between;
    }
    .audit-label { display: flex; align-items: center; gap: 9px; cursor: pointer; user-select: none; }
    .audit-label input[type="checkbox"] { display: none; }
    .audit-box {
      width: 22px; height: 22px;
      border: 2px solid var(--border-dk);
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; transition: all 0.2s;
      background: white; color: transparent; flex-shrink: 0;
    }
    .audit-label:hover .audit-box { border-color: var(--green); }
    .audit-label input:checked ~ .audit-box { background: var(--green); border-color: var(--green); color: white; }
    .audit-text { font-size: 13px; color: var(--muted); transition: color 0.2s; font-weight: 600; }
    .audit-label input:checked ~ .audit-box ~ .audit-text { color: var(--green); }
    .audit-timestamp { font-size: 11px; color: var(--muted); }

    /* ===== TEACHER INFO ===== */
    .teacher-info-bar {
      background: linear-gradient(90deg, #EAF4FF 0%, #F5FBFF 100%);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .teacher-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 13px;
      font-weight: 700;
      color: var(--unrwa-blue-dk);
    }
    .teacher-chip .chip-icon { font-size: 15px; }
    .teacher-chip .chip-label { font-size: 10px; color: var(--muted); font-weight: 600; margin-left: 2px; }
    .no-teacher { font-size: 12px; color: var(--muted); font-style: italic; }

    /* ===== LOADING / ERROR ===== */
    .loading-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 80px 20px; gap: 14px; color: var(--muted);
    }
    .loader {
      width: 44px; height: 44px;
      border: 3px solid var(--border);
      border-top-color: var(--unrwa-blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .error-state {
      background: var(--red-lt); border: 1px solid #F0B4AE;
      border-radius: 10px; padding: 20px; text-align: center;
      color: var(--red); margin: 20px;
    }

    /* ===== STATS MODAL ===== */
    .modal-overlay {
      display: none;
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,40,80,0.55);
      z-index: 999;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: white;
      border-radius: 18px;
      width: 95%;
      max-width: 750px;
      max-height: 85vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,40,80,0.3);
      animation: modalIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
    }
    @keyframes modalIn { from { opacity:0; transform:scale(0.9) translateY(20px); } to { opacity:1; transform:scale(1) translateY(0); } }
    .modal-header {
      background: linear-gradient(135deg, var(--unrwa-blue-dk), var(--unrwa-blue));
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .modal-header h2 { color: white; font-size: 18px; font-weight: 900; }
    .modal-close {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      border-radius: 8px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 16px;
      font-family: "Tajawal", sans-serif;
      font-weight: 700;
    }
    .modal-close:hover { background: rgba(255,255,255,0.35); }
    .modal-tabs {
      display: flex;
      border-bottom: 2px solid var(--border);
      flex-shrink: 0;
      background: var(--unrwa-sky);
    }
    .modal-tab {
      flex: 1;
      padding: 13px;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
      font-family: "Tajawal", sans-serif;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
    }
    .modal-tab.active { color: var(--unrwa-blue); border-bottom-color: var(--unrwa-blue); background: white; }
    .modal-body {
      overflow-y: auto;
      padding: 20px 24px;
      flex: 1;
    }
    .stat-table { width: 100%; border-collapse: collapse; }
    .stat-table thead th {
      background: var(--unrwa-blue-dk);
      color: white;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
      text-align: right;
    }
    .stat-table thead th:last-child { text-align: center; }
    .stat-table tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
    .stat-table tbody tr:hover { background: var(--unrwa-sky); }
    .stat-table tbody td { padding: 11px 14px; font-size: 14px; color: var(--text); }
    .stat-table tbody td:last-child { text-align: center; }
    .rank-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px; height: 26px;
      border-radius: 50%;
      font-size: 13px;
      font-weight: 900;
      background: var(--unrwa-sky2);
      color: var(--unrwa-blue);
    }
    .rank-badge.gold { background: #FEF3C7; color: #B45309; }
    .rank-badge.silver { background: #F1F5F9; color: #64748B; }
    .rank-badge.bronze { background: #FEF0E7; color: #C2410C; }
    .rooms-count-bar {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .bar-fill {
      height: 8px;
      border-radius: 4px;
      background: var(--unrwa-blue);
      transition: width 0.5s;
    }
    .rooms-num {
      font-size: 16px;
      font-weight: 900;
      color: var(--unrwa-blue);
      min-width: 24px;
    }
    .students-num {
      font-size: 13px;
      color: var(--muted);
    }
    .stats-btn {
      background: linear-gradient(135deg, #E07B00, #F59E0B);
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-family: "Tajawal", sans-serif;
      font-size: 13px;
      font-weight: 700;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(224,123,0,0.3);
    }
    .stats-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(224,123,0,0.4); }

    /* ===== SORT & DATE TOOLBAR ===== */
    .sort-toolbar {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 10px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .sort-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 1px;
    }
    .sort-btn {
      background: var(--unrwa-sky);
      border: 1.5px solid var(--border);
      color: var(--unrwa-blue-dk);
      border-radius: 8px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: "Tajawal", sans-serif;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .sort-btn:hover { border-color: var(--unrwa-blue); background: var(--unrwa-sky2); }
    .sort-btn.active {
      background: var(--unrwa-blue);
      border-color: var(--unrwa-blue-dk);
      color: white;
    }
    .sort-divider {
      width: 1px; height: 28px;
      background: var(--border);
    }
    .date-filter-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .date-input {
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 13px;
      font-family: "Tajawal", sans-serif;
      color: var(--text);
      background: white;
      cursor: pointer;
      transition: border-color 0.2s;
      outline: none;
    }
    .date-input:focus { border-color: var(--unrwa-blue); }
    .date-filter-btn {
      background: var(--unrwa-blue);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: "Tajawal", sans-serif;
      transition: all 0.2s;
    }
    .date-filter-btn:hover { background: var(--unrwa-blue-dk); }
    .date-clear-btn {
      background: var(--red-lt);
      color: var(--red);
      border: 1.5px solid #F0B4AE;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: "Tajawal", sans-serif;
      transition: all 0.2s;
      display: none;
    }
    .date-clear-btn.show { display: inline-flex; align-items: center; gap: 4px; }
    .date-clear-btn:hover { background: #FDECEA; border-color: var(--red); }

    /* ===== AUDIT STORAGE BADGE ===== */
    .audit-saved-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--green-lt);
      border: 1px solid #9ADBC3;
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 11px;
      color: var(--green);
      font-weight: 700;
      margin-right: 8px;
      animation: fadeIn 0.3s ease;
    }

    @media (max-width: 600px) {
      .top-bar { padding: 0 14px; flex-wrap: wrap; height: auto; padding: 12px 14px; gap: 10px; }
      .stats-bar { padding: 12px 14px; }
      .main { padding: 14px; }
      .rooms-grid { grid-template-columns: 1fr; }
      .filter-badge { margin: 10px 14px 0; }
      .sort-toolbar { padding: 10px 14px; }
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="top-bar-title">
      <div class="unrwa-logo">UNRWA</div>
      <div class="pulse-dot"></div>
      <h1>🏫 لوحة مراقبة الغرف</h1>
    </div>
    <div class="meta-info">
      <span>آخر تحديث: <strong id="last-update">--:--</strong></span>

      <button class="stats-btn" onclick="openStatsModal()">📊 إحصائيات المدارس</button>
      <button class="refresh-btn" onclick="loadData(true)" id="refreshBtn">🔄 تحديث</button>
    </div>
  </div>
  <div class="blue-stripe"></div>

  <!-- SORT & DATE FILTER TOOLBAR -->
  <div class="sort-toolbar">
    <span class="sort-label">🔃 ترتيب:</span>
    <button class="sort-btn active" id="sort-default" onclick="setSortMode('default')">🔢 افتراضي</button>
    <button class="sort-btn" id="sort-asc" onclick="setSortMode('asc')">📅 تاريخ ↑ تصاعدي</button>
    <button class="sort-btn" id="sort-desc" onclick="setSortMode('desc')">📅 تاريخ ↓ تنازلي</button>
    <div class="sort-divider"></div>
    <div class="date-filter-group">
      <span class="sort-label">📆 فلتر بتاريخ:</span>
      <input type="date" class="date-input" id="dateFilterInput" onchange="applyDateFilter()" />
      <button class="date-clear-btn" id="dateClearBtn" onclick="clearDateFilter()">✕ مسح التاريخ</button>
    </div>
  </div>

  <!-- STATS BAR -->
  <div class="stats-bar">
    <div class="stat-chip active" id="chip-all" onclick="setFilter('all')">
      <span class="icon">🚪</span>
      <div class="info">
        <div class="label">جميع الغرف</div>
        <div class="value" id="stat-rooms">0</div>
        <span class="filter-hint">اضغط للعرض</span>
      </div>
    </div>
    <div class="stat-chip" id="chip-students" onclick="setFilter('all')">
      <span class="icon">👥</span>
      <div class="info">
        <div class="label">إجمالي الطلاب</div>
        <div class="value" id="stat-students">0</div>
      </div>
    </div>
    <div class="stat-chip" id="chip-top">
      <span class="icon">⭐</span>
      <div class="info">
        <div class="label">أعلى نقاط</div>
        <div class="value" id="stat-top">0</div>
      </div>
    </div>
    <div class="stat-chip" id="chip-avg">
      <span class="icon">📊</span>
      <div class="info">
        <div class="label">متوسط النقاط</div>
        <div class="value" id="stat-avg">0</div>
      </div>
    </div>
    <div class="stat-chip green" id="chip-audited" onclick="setFilter('audited')">
      <span class="icon">✅</span>
      <div class="info">
        <div class="label">غرف مدققة</div>
        <div class="value" id="stat-audited">0</div>
        <span class="filter-hint">اضغط للعرض</span>
      </div>
    </div>
    <div class="stat-chip red" id="chip-not-audited" onclick="setFilter('not-audited')">
      <span class="icon">⏳</span>
      <div class="info">
        <div class="label">غير مدققة</div>
        <div class="value" id="stat-not-audited">0</div>
        <span class="filter-hint">اضغط للعرض</span>
      </div>
    </div>
  </div>

  <!-- FILTER BADGE -->
  <div class="filter-badge" id="filterBadge">
    <span id="filterLabel"></span>
    <button onclick="setFilter('all')">✕ إلغاء الفلتر</button>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">
    <div class="loading-state" id="loadingState">
      <div class="loader"></div>
      <div>جاري تحميل البيانات...</div>
    </div>
    <div id="errorState" class="error-state" style="display:none"></div>
    <div id="roomsContainer" style="display:none">
      <div class="section-title" id="sectionTitle">🚪 جميع الغرف</div>
      <div class="rooms-grid" id="roomsGrid"></div>
    </div>
  </div>

<script>
  const SHEET_ID = "1M-LkkAoNarQDN6_Hbb5ZGhs4vuD5cfhREKpZE-48_tg";
  const AUDIT_STORAGE_KEY = "unrwa_audit_states_v2";

  let currentFilter = "all";
  let currentSortMode = "default";
  let currentDateFilter = null;
  const auditStates = {};

  // ===== LOAD / SAVE AUDIT STATES =====
  function loadAuditStates() {
    try {
      const saved = localStorage.getItem(AUDIT_STORAGE_KEY);
      if (saved) {
        const parsed = JSON.parse(saved);
        Object.assign(auditStates, parsed);
      }
    } catch(e) {}
  }

  function saveAuditStates() {
    try {
      localStorage.setItem(AUDIT_STORAGE_KEY, JSON.stringify(auditStates));
    } catch(e) {}
  }

  function getAuditCount() {
    return Object.values(auditStates).filter(v => v === true).length;
  }

  function hasEmoji(str) {
    const emojiRegex = /[\u{1F300}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{1F000}-\u{1F02F}\u{1F0A0}-\u{1F0FF}\u{1F100}-\u{1F1FF}\u{1F200}-\u{1F2FF}\u{1F004}\u{1F0CF}]/u;
    return emojiRegex.test(str);
  }
  function isRoomNumber(val) {
    if (val === null || val === undefined || val === "") return false;
    return /^\d+$/.test(String(val).trim());
  }
  function formatDate(val) {
    if (!val) return null;
    try {
      if (typeof val === "string" && val.startsWith("Date(")) {
        const parts = val.slice(5,-1).split(",").map(Number);
        const d = new Date(parts[0], parts[1], parts[2], parts[3]||0, parts[4]||0);
        return d.toLocaleDateString("ar-SA", {year:"numeric",month:"short",day:"numeric"});
      }
      const d = new Date(val);
      if (!isNaN(d)) return d.toLocaleDateString("ar-SA",{year:"numeric",month:"short",day:"numeric"});
    } catch(e) {}
    return String(val);
  }

  // Parse a student date value to a JS Date object for comparison
  function parseStudentDate(val) {
    if (!val) return null;
    try {
      if (typeof val === "string" && val.startsWith("Date(")) {
        const parts = val.slice(5,-1).split(",").map(Number);
        return new Date(parts[0], parts[1], parts[2], parts[3]||0, parts[4]||0);
      }
      const d = new Date(val);
      if (!isNaN(d)) return d;
    } catch(e) {}
    return null;
  }

  // Get the earliest student date in a room (for sorting)
  function getRoomEarliestDate(room) {
    const dates = room.students.map(s => parseStudentDate(s.date)).filter(Boolean);
    if (!dates.length) return null;
    return new Date(Math.min(...dates.map(d => d.getTime())));
  }

  // Check if a room has any student with a matching date
  function roomMatchesDate(room, targetDateStr) {
    if (!targetDateStr) return true;
    const target = new Date(targetDateStr);
    target.setHours(0,0,0,0);
    return room.students.some(s => {
      const d = parseStudentDate(s.date);
      if (!d) return false;
      const dc = new Date(d); dc.setHours(0,0,0,0);
      return dc.getTime() === target.getTime();
    });
  }

  // ===== SORT MODE =====
  function setSortMode(mode) {
    currentSortMode = mode;
    ["default","asc","desc"].forEach(m => {
      const btn = document.getElementById("sort-" + m);
      if (btn) btn.classList.toggle("active", m === mode);
    });
    renderRooms();
  }

  // ===== DATE FILTER =====
  function applyDateFilter() {
    const val = document.getElementById("dateFilterInput").value;
    currentDateFilter = val || null;
    const clearBtn = document.getElementById("dateClearBtn");
    if (clearBtn) clearBtn.classList.toggle("show", !!val);
    renderRooms();
  }

  function clearDateFilter() {
    currentDateFilter = null;
    document.getElementById("dateFilterInput").value = "";
    const clearBtn = document.getElementById("dateClearBtn");
    if (clearBtn) clearBtn.classList.remove("show");
    renderRooms();
  }

  // ===== FILTER =====
  function setFilter(f) {
    currentFilter = f;
    ["all","audited","not-audited"].forEach(k => {
      const el = document.getElementById("chip-" + k);
      if (el) el.classList.toggle("active", k === f);
    });
    const badge = document.getElementById("filterBadge");
    const label = document.getElementById("filterLabel");
    const title = document.getElementById("sectionTitle");
    if (f === "all") {
      badge.classList.remove("show");
      title.textContent = "🚪 جميع الغرف";
    } else if (f === "audited") {
      badge.classList.add("show");
      label.textContent = "✅ عرض الغرف المدققة فقط";
      title.textContent = "✅ الغرف المدققة";
    } else {
      badge.classList.add("show");
      label.textContent = "⏳ عرض الغرف غير المدققة فقط";
      title.textContent = "⏳ الغرف غير المدققة";
    }
    renderRooms();
  }

  // ===== RENDER ROOMS (sort + filter + date) =====
  function renderRooms() {
    let rooms = [...allRoomsData];

    // Apply date filter
    if (currentDateFilter) {
      rooms = rooms.filter(r => roomMatchesDate(r, currentDateFilter));
    }

    // Apply sort
    if (currentSortMode === "asc") {
      rooms.sort((a, b) => {
        const da = getRoomEarliestDate(a), db = getRoomEarliestDate(b);
        if (!da && !db) return 0;
        if (!da) return 1;
        if (!db) return -1;
        return da - db;
      });
    } else if (currentSortMode === "desc") {
      rooms.sort((a, b) => {
        const da = getRoomEarliestDate(a), db = getRoomEarliestDate(b);
        if (!da && !db) return 0;
        if (!da) return 1;
        if (!db) return -1;
        return db - da;
      });
    }

    const grid = document.getElementById("roomsGrid");
    grid.innerHTML = "";
    if (rooms.length === 0) {
      grid.innerHTML = "<div style='color:var(--muted);padding:40px;text-align:center;'>لا توجد غرف تطابق الفلتر المحدد</div>";
      return;
    }
    rooms.forEach((room, i) => {
      const origIdx = allRoomsData.indexOf(room);
      const card = buildRoomCard(room, origIdx);
      grid.appendChild(card);
    });

    // Re-apply audit visual states
    Object.entries(auditStates).forEach(([roomId, checked]) => {
      const card = document.getElementById("card-" + roomId);
      const cb = document.getElementById("chk-" + roomId);
      const ts = document.getElementById("ts-" + roomId);
      if (card && cb && checked) {
        cb.checked = true;
        card.classList.add("audited");
        if (ts && !ts.textContent) ts.textContent = "✓ محفوظ";
      }
    });

    // Apply status filter
    applyStatusFilter();
    updateAuditStats();
  }

  function applyStatusFilter() {
    document.querySelectorAll(".room-card").forEach(card => {
      const isAudited = card.classList.contains("audited");
      if (currentFilter === "all") card.style.display = "";
      else if (currentFilter === "audited") card.style.display = isAudited ? "" : "none";
      else card.style.display = !isAudited ? "" : "none";
    });
  }

  // ===== AUDIT =====
  function updateAuditStats() {
    const cards = document.querySelectorAll(".room-card");
    const audited = [...cards].filter(c => c.classList.contains("audited")).length;
    document.getElementById("stat-audited").textContent = audited;
    document.getElementById("stat-not-audited").textContent = cards.length - audited;
    applyStatusFilter();
  }

  function toggleAudit(roomId, checkboxId, tsId) {
    const cb   = document.getElementById(checkboxId);
    const card = document.getElementById("card-" + roomId);
    const ts   = document.getElementById(tsId);
    auditStates[roomId] = cb.checked;
    saveAuditStates();
    if (cb.checked) {
      card.classList.add("audited");
      const now = new Date().toLocaleTimeString("ar-SA");
      ts.textContent = "✓ تم التدقيق " + now;
      auditStates[roomId + "__ts"] = now;
      saveAuditStates();
    } else {
      card.classList.remove("audited");
      ts.textContent = "";
      delete auditStates[roomId + "__ts"];
      saveAuditStates();
    }
    updateAuditStats();
    updateSavedBadge();
  }

  function updateSavedBadge() {
    const count = getAuditCount();
    let badge = document.getElementById("auditSavedBadge");
    if (!badge) {
      badge = document.createElement("span");
      badge.id = "auditSavedBadge";
      badge.className = "audit-saved-badge";
      const bar = document.querySelector(".stats-bar");
      if (bar) bar.appendChild(badge);
    }
    badge.innerHTML = `💾 ${count} غرفة محفوظة`;
    badge.style.display = count > 0 ? "inline-flex" : "none";
  }

  // ===== QUESTIONS =====
  function parseQuestions(raw) {
    if (!raw) return null;
    const str = String(raw).trim();
    if (!str.startsWith("[") && !str.startsWith("{")) return null;
    try { const p = JSON.parse(str); return Array.isArray(p) ? p : [p]; } catch(e) { return null; }
  }
  const LETTERS = ["أ","ب","ج","د","هـ","و"];

  function buildQuestionBody(q) {
    const type = (q.type || "mc").toLowerCase();

    // شريحة نصية
    if (type === "textslide") {
      return `<div style="background:${q.textBg||'#1084b5'};border-radius:8px;padding:12px 14px;color:#fff;font-family:'Cairo',sans-serif;font-size:14px;line-height:1.8;">${q.textContent||q.q||""}</div>`;
    }

    const imgHTML = q.img ? `<img src="${q.img}" style="max-width:100%;border-radius:7px;margin-bottom:8px;display:block;"/>` : "";

    // اختيار من متعدد
    if (type === "mc") {
      const optsHTML = (q.opts||[]).map((opt,oi) =>
        `<div class="opt-item${q.ans===oi?" correct":""}">
          <span class="opt-letter">${LETTERS[oi]||(oi+1)}</span><span>${opt}</span>
        </div>`).join("");
      return `${imgHTML}<div class="q-text">${q.q||""}</div>${optsHTML?`<div class="opts-grid" style="margin-top:8px;">${optsHTML}</div>`:""}`;
    }

    // تعبئة فراغ
    if (type === "blanks") {
      const answers = (q.blanks||[]).join(" / ");
      return `${imgHTML}<div class="q-text">${q.q||""}</div>
        <div style="margin-top:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <span style="font-size:11px;font-weight:700;color:var(--muted);">الإجابة:</span>
          <span style="background:var(--green-lt);border:1px solid #9ADBC3;color:#0E6644;border-radius:6px;padding:3px 12px;font-size:13px;font-family:'Cairo',sans-serif;">${answers}</span>
        </div>`;
    }

    // مطابقة
    if (type === "matching") {
      const pairsHTML = (q.pairs||[]).map(p =>
        `<div style="display:flex;align-items:center;gap:10px;background:white;border:1px solid var(--border);border-radius:7px;padding:6px 10px;">
          <span style="flex:1;font-size:13px;font-family:'Cairo',sans-serif;color:var(--text2);">${p.left}</span>
          <span style="color:var(--muted);">←→</span>
          <span style="flex:1;font-size:13px;font-family:'Cairo',sans-serif;color:var(--green);font-weight:700;">${p.right}</span>
        </div>`).join("");
      return `<div class="q-text">${q.q||""}</div>
        <div style="display:flex;flex-direction:column;gap:6px;margin-top:8px;">${pairsHTML}</div>`;
    }

    // سحب وإفلات
    if (type === "dragdrop") {
      const zones = q.zones || [];
      const zoneMap = {};
      zones.forEach((z,i) => { zoneMap[i] = []; });
      (q.items||[]).forEach(item => {
        const zi = item.zoneIndex;
        if (zoneMap[zi] !== undefined) zoneMap[zi].push(item.text);
      });
      const zonesHTML = zones.map((z,i) =>
        `<div style="flex:1;min-width:120px;">
          <div style="font-size:11px;font-weight:700;color:var(--unrwa-blue);margin-bottom:5px;text-align:center;">${z}</div>
          <div style="background:var(--unrwa-sky);border:1.5px dashed var(--border-dk);border-radius:8px;padding:8px;display:flex;flex-wrap:wrap;gap:5px;min-height:40px;">
            ${(zoneMap[i]||[]).map(t=>`<span style="background:white;border:1px solid var(--border);border-radius:5px;padding:3px 10px;font-size:13px;font-family:'Cairo',sans-serif;">${t}</span>`).join("")}
          </div>
        </div>`).join("");
      return `<div class="q-text">${q.q||""}</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;">${zonesHTML}</div>`;
    }

    // نص عادي أو نوع غير معروف
    return `${imgHTML}<div class="q-text">${q.q||""}</div>`;
  }

  function buildQuestionsHTML(raw, roomId) {
    const qs = parseQuestions(raw);
    if (!qs) return raw ? `<div class="room-questions"><div class="questions-label">📋 الأسئلة</div><div class="questions-text">${raw}</div></div>` : "";
    const listId = "qlist-" + roomId, btnId = "qbtn-" + roomId;

    const realQs = qs.filter(q => (q.type||"mc") !== "config");
    const qCount = realQs.filter(q => (q.type||"mc") !== "textslide").length;

    let qNum = 0;
    const TYPE_LABELS = { mc:"اختيار متعدد", blanks:"تعبئة فراغ", matching:"مطابقة", dragdrop:"سحب وإفلات", textslide:"شريحة نصية" };
    const cardsHTML = realQs.map(q => {
      const type = (q.type || "mc").toLowerCase();
      const isSlide = type === "textslide";
      if (!isSlide) qNum++;
      const typeBadge = `<span style="background:var(--unrwa-sky2);color:var(--unrwa-blue);border-radius:8px;padding:1px 8px;font-size:10px;font-weight:700;border:1px solid var(--border);margin-right:6px;">${TYPE_LABELS[type]||type}</span>`;
      const numLabel = isSlide ? `<span style="color:var(--muted);font-size:10px;">📄 شريحة</span>` : `<div class="q-num" style="display:inline;">السؤال ${qNum}</div>`;
      return `<div class="q-card"><div style="margin-bottom:6px;">${numLabel}${typeBadge}</div><div>${buildQuestionBody(q)}</div></div>`;
    }).join("");

    return `<div class="room-questions">
      <div class="questions-label">
        📋 الأسئلة
        <span class="q-count">${qCount} سؤال</span>
        <button class="toggle-q-btn" id="${btnId}" onclick="toggleSection('${listId}','${btnId}')">عرض ◀</button>
      </div>
      <div class="questions-list" id="${listId}" style="display:none;">${cardsHTML}</div>
    </div>`;
  }

  function toggleSection(listId, btnId) {
    const list = document.getElementById(listId);
    const btn  = document.getElementById(btnId);
    if (!list) return;
    const hidden = list.style.display === "none";
    list.style.display = hidden ? "flex" : "none";
    btn.textContent = hidden ? "إخفاء ▼" : "عرض ◀";
    if (hidden && window.MathJax) MathJax.typesetPromise([list]).catch(()=>{});
  }

  // ===== BUILD CARD =====
  function buildRoomCard(room, idx) {
    const card = document.createElement("div");
    card.className = "room-card";
    card.id = "card-room-" + idx;
    card.style.animationDelay = (idx * 0.06) + "s";
    const roomId = "room-" + idx;
    const sorted = [...room.students].sort((a,b)=>(Number(b.score)||0)-(Number(a.score)||0));
    const studentsHTML = sorted.length > 0
      ? sorted.map((s,i) => {
          const score = s.score !== null ? Number(s.score) : null;
          const dateStr = formatDate(s.date);
          const medal = i===0&&score!==null?"🥇":i===1?"🥈":i===2?"🥉":"";
          return `<div class="student-row">
            <div>
              <div class="student-name">${s.name}</div>
              ${dateStr?`<div class="student-meta"><span class="date-badge">📅 ${dateStr}</span></div>`:""}
            </div>
            <div class="student-score">
              ${medal?`<span>${medal}</span>`:""}
              ${score!==null?`<span>${score}</span><span class="score-icon">⭐</span>`:`<span style="color:var(--muted);font-size:12px">—</span>`}
            </div>
          </div>`;
        }).join("")
      : `<div class="empty-room">لا يوجد طلاب مسجلون في هذه الغرفة</div>`;
    const stuListId = "stulist-" + roomId, stuBtnId = "stubtn-" + roomId;
    const teacherHTML = (room.teacherName || room.schoolName) ? `
      <div class="teacher-info-bar">
        <div class="teacher-chip"><span class="chip-icon">👨‍🏫</span><span class="chip-label">المعلم</span>${room.teacherName||'—'}</div>
        <div class="teacher-chip"><span class="chip-icon">🏫</span><span class="chip-label">المدرسة</span>${room.schoolName||'—'}</div>
      </div>` : `<div class="teacher-info-bar"><span class="no-teacher">لا توجد معلومات معلم لهذه الغرفة</span></div>`;

    // Check saved audit state
    const savedAudited = auditStates[roomId] === true;
    const savedTs = auditStates[roomId + "__ts"] || "";
    if (savedAudited) card.classList.add("audited");

    card.innerHTML = `
      <div class="room-header">
        <div class="room-number">
          <div class="room-badge">${room.number}</div>
          <div class="room-label">رقم الغرفة</div>
        </div>
        <div class="student-count-badge">👤 ${room.students.length} طالب</div>
      </div>
      ${teacherHTML}
      ${buildQuestionsHTML(room.questions, roomId)}
      <div class="room-students">
        <div class="students-label">
          👥 الطلاب المشاركون
          <span class="q-count">${room.students.length}</span>
          <button class="toggle-q-btn" id="${stuBtnId}" onclick="toggleSection('${stuListId}','${stuBtnId}')">عرض ◀</button>
        </div>
        <div class="students-list" id="${stuListId}" style="display:none;">${studentsHTML}</div>
      </div>
      <div class="audit-bar">
        <label class="audit-label">
          <input type="checkbox" id="chk-${roomId}" ${savedAudited?"checked":""} onchange="toggleAudit('${roomId}','chk-${roomId}','ts-${roomId}')">
          <span class="audit-box">✓</span>
          <span class="audit-text">تم التدقيق</span>
        </label>
        <span class="audit-timestamp" id="ts-${roomId}">${savedAudited && savedTs ? "✓ تم التدقيق " + savedTs : ""}</span>
      </div>`;
    return card;
  }

  // ===== GLOBAL ROOMS DATA =====
  let allRoomsData = [];

  // ===== STATS MODAL =====
  let currentTab = 'schools';

  function openStatsModal() {
    buildStatsContent(currentTab);
    document.getElementById('statsModal').classList.add('open');
  }

  function closeStatsModal() {
    document.getElementById('statsModal').classList.remove('open');
  }

  function closeModalOutside(e) {
    if (e.target === document.getElementById('statsModal')) closeStatsModal();
  }

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.modal-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    buildStatsContent(tab);
  }

  function buildStatsContent(tab) {
    const body = document.getElementById('modalBody');
    const rooms = allRoomsData;
    if (!rooms.length) { body.innerHTML = '<div style="text-align:center;color:var(--muted);padding:40px;">لا توجد بيانات</div>'; return; }

    if (tab === 'schools') {
      const schoolMap = {};
      rooms.forEach(r => {
        const school = r.schoolName || 'غير محدد';
        if (!schoolMap[school]) schoolMap[school] = { rooms: 0, students: 0, teachers: new Set(), audited: 0 };
        schoolMap[school].rooms++;
        schoolMap[school].students += r.students.length;
        if (r.teacherName) schoolMap[school].teachers.add(r.teacherName);
        // count audited rooms
        const idx = allRoomsData.indexOf(r);
        if (auditStates["room-" + idx]) schoolMap[school].audited++;
      });
      const sorted = Object.entries(schoolMap).sort((a,b) => b[1].rooms - a[1].rooms);
      const maxRooms = sorted[0]?.[1].rooms || 1;
      const medals = ['gold','silver','bronze'];
      body.innerHTML = `
        <div style="margin-bottom:14px;font-size:13px;color:var(--muted);">إجمالي المدارس المشاركة: <strong style="color:var(--unrwa-blue)">${sorted.length}</strong></div>
        <table class="stat-table">
          <thead><tr>
            <th>#</th>
            <th>المدرسة</th>
            <th>عدد الغرف</th>
            <th>الطلاب</th>
            <th>المعلمون</th>
            <th>مدققة ✅</th>
          </tr></thead>
          <tbody>
            ${sorted.map(([school, d], i) => `
              <tr>
                <td><span class="rank-badge ${medals[i]||''}">${i+1}</span></td>
                <td><strong>${school}</strong></td>
                <td>
                  <div class="rooms-count-bar">
                    <div class="bar-fill" style="width:${Math.round((d.rooms/maxRooms)*120)}px"></div>
                    <span class="rooms-num">${d.rooms}</span>
                  </div>
                </td>
                <td><span class="students-num">👥 ${d.students}</span></td>
                <td><span class="students-num">👨‍🏫 ${d.teachers.size}</span></td>
                <td><span class="students-num" style="color:var(--green)">✅ ${d.audited}</span></td>
              </tr>`).join('')}
          </tbody>
        </table>`;
    } else {
      const teacherMap = {};
      rooms.forEach(r => {
        const teacher = r.teacherName || 'غير محدد';
        const school = r.schoolName || 'غير محدد';
        if (!teacherMap[teacher]) teacherMap[teacher] = { rooms: 0, students: 0, school, audited: 0 };
        teacherMap[teacher].rooms++;
        teacherMap[teacher].students += r.students.length;
        const idx = allRoomsData.indexOf(r);
        if (auditStates["room-" + idx]) teacherMap[teacher].audited++;
      });
      const sorted = Object.entries(teacherMap).sort((a,b) => b[1].rooms - a[1].rooms);
      const maxRooms = sorted[0]?.[1].rooms || 1;
      const medals = ['gold','silver','bronze'];
      body.innerHTML = `
        <div style="margin-bottom:14px;font-size:13px;color:var(--muted);">إجمالي المعلمين المشاركين: <strong style="color:var(--unrwa-blue)">${sorted.length}</strong></div>
        <table class="stat-table">
          <thead><tr>
            <th>#</th>
            <th>المعلم</th>
            <th>المدرسة</th>
            <th>عدد الغرف</th>
            <th>الطلاب</th>
            <th>مدققة ✅</th>
          </tr></thead>
          <tbody>
            ${sorted.map(([teacher, d], i) => `
              <tr>
                <td><span class="rank-badge ${medals[i]||''}">${i+1}</span></td>
                <td><strong>${teacher}</strong></td>
                <td><span style="font-size:13px;color:var(--muted);">🏫 ${d.school}</span></td>
                <td>
                  <div class="rooms-count-bar">
                    <div class="bar-fill" style="width:${Math.round((d.rooms/maxRooms)*100)}px"></div>
                    <span class="rooms-num">${d.rooms}</span>
                  </div>
                </td>
                <td><span class="students-num">👥 ${d.students}</span></td>
                <td><span class="students-num" style="color:var(--green)">✅ ${d.audited}</span></td>
              </tr>`).join('')}
          </tbody>
        </table>`;
    }
  }

  // ===== LOAD DATA =====
  async function loadData(manual = false) {
    if (manual) {
      const btn = document.getElementById("refreshBtn");
      btn.style.animation = "spin 1s linear infinite";
      setTimeout(()=>btn.style.animation="",1200);
    }
    const loading = document.getElementById("loadingState");
    const errorState = document.getElementById("errorState");
    const roomsContainer = document.getElementById("roomsContainer");
    try {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
      const response = await fetch(url);
      const text = await response.text();
      const json = JSON.parse(text.substring(47, text.length - 2));
      const allRows = json.table.rows;
      if (!allRows || allRows.length === 0) throw new Error("لا توجد بيانات في الجدول");
      const rows = allRows.slice(19);
      const teacherMap = {};
      rows.forEach(row => {
        const col0 = row.c[0]?(row.c[0].v!==null?String(row.c[0].v).trim():""):"";
        const col1 = row.c[1]?(row.c[1].v!==null?String(row.c[1].v).trim():""):"";
        if (col0 === "معلومات المعلم" && col1) {
          const parts = col1.split("&");
          const roomNum = (parts[0]||"").trim();
          const teacherName = (parts[1]||"").trim();
          const schoolName = (parts[2]||"").trim();
          if (roomNum) teacherMap[roomNum] = { teacherName, schoolName };
        }
      });

      const rooms = [];
      let currentRoom = null;
      rows.forEach(row => {
        const col0 = row.c[0]?(row.c[0].v!==null&&row.c[0].v!==undefined?String(row.c[0].v).trim():""):"";
        const col1 = row.c[1]?(row.c[1].v!==null?row.c[1].v:""):"";
        const col2 = row.c[2]?(row.c[2].v!==null?row.c[2].v:null):null;
        const col3 = row.c[3]?(row.c[3].v!==null?row.c[3].v:null):null;
        if (!col0) return;
        if (col0 === "معلومات المعلم") return;
        if (isRoomNumber(col0)) {
          const info = teacherMap[col0] || { teacherName: "", schoolName: "" };
          currentRoom = { number: col0, questions: col1?String(col1):"", students: [], teacherName: info.teacherName, schoolName: info.schoolName };
          rooms.push(currentRoom);
        } else if (currentRoom) {
          currentRoom.students.push({ name: col0, score: col1!==""?col1:null, date: col2||col3 });
        }
      });
      const totalStudents = rooms.reduce((s,r)=>s+r.students.length,0);
      const allScores = rooms.flatMap(r=>r.students.map(s=>Number(s.score)||0)).filter(s=>s>0);
      document.getElementById("stat-rooms").textContent = rooms.length;
      document.getElementById("stat-students").textContent = totalStudents;
      document.getElementById("stat-top").textContent = allScores.length?Math.max(...allScores):0;
      document.getElementById("stat-avg").textContent = allScores.length?Math.round(allScores.reduce((a,b)=>a+b,0)/allScores.length):0;

      allRoomsData = rooms;
      loading.style.display = "none";
      errorState.style.display = "none";
      roomsContainer.style.display = "block";
      document.getElementById("last-update").textContent = new Date().toLocaleTimeString("ar-SA");

      renderRooms();
      updateSavedBadge();
    } catch(err) {
      loading.style.display = "none";
      errorState.style.display = "block";
      errorState.textContent = "⚠️ خطأ في تحميل البيانات: " + err.message;
    }
  }

  // Load saved audit states then fetch data
  loadAuditStates();
  loadData();
</script>
</body>
</html>
