<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة مراقبة الغرف</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />
  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(','\\)'], ['$','$']], displayMath: [['$$','$$']] },
      options: { skipHtmlTags: ['script','noscript','style','textarea'] },
      startup: { typeset: false }
    };
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-chtml.min.js" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #0b0f1a;
      --surface: #131929;
      --card: #1a2238;
      --border: #2a3a5c;
      --accent: #00d4ff;
      --accent2: #7c3aed;
      --accent3: #f59e0b;
      --green: #10b981;
      --text: #e8f0fe;
      --muted: #8899bb;
      --room-header: #0f1d35;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0;
      overflow-x: hidden;
    }

    /* ===== HEADER ===== */
    .top-bar {
      background: linear-gradient(90deg, #0b0f1a 0%, #131929 50%, #0b0f1a 100%);
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .top-bar-title {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .top-bar-title h1 {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .pulse-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.6); }
      50% { box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
    }
    .meta-info {
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: 13px;
      color: var(--muted);
    }
    .meta-info span { display: flex; align-items: center; gap: 6px; }
    .refresh-btn {
      background: linear-gradient(135deg, var(--accent2), #4c1d95);
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Tajawal', sans-serif;
      font-size: 14px;
      font-weight: 700;
      transition: all 0.2s;
    }
    .refresh-btn:hover { opacity: 0.85; transform: scale(1.03); }
    .refresh-btn:active { transform: scale(0.97); }
    .refresh-btn.spinning { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* ===== STATS BAR ===== */
    .stats-bar {
      display: flex;
      gap: 16px;
      padding: 20px 32px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }
    .stat-chip {
      flex-shrink: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 22px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .stat-chip .icon { font-size: 22px; }
    .stat-chip .info { }
    .stat-chip .label { font-size: 11px; color: var(--muted); }
    .stat-chip .value { font-size: 20px; font-weight: 900; color: var(--accent); }

    /* ===== MAIN GRID ===== */
    .main { padding: 28px 32px; }
    .section-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .rooms-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 20px;
    }

    /* ===== ROOM CARD ===== */
    .room-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: border-color 0.3s, transform 0.2s;
      animation: fadeIn 0.5s ease both;
    }
    .room-card:hover {
      border-color: var(--accent2);
      transform: translateY(-2px);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .room-header {
      background: linear-gradient(135deg, var(--room-header) 0%, #0e1e3a 100%);
      border-bottom: 1px solid var(--border);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .room-number {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .room-badge {
      background: linear-gradient(135deg, var(--accent2), #7c3aed88);
      border-radius: 8px;
      padding: 4px 12px;
      font-size: 18px;
      font-weight: 900;
      color: white;
    }
    .room-label { font-size: 13px; color: var(--muted); }

    .student-count-badge {
      background: rgba(0, 212, 255, 0.1);
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 12px;
      color: var(--accent);
      font-weight: 700;
    }

    /* Questions */
    .room-questions {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }
    .questions-label {
      font-size: 11px;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 1.5px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .questions-label .q-count {
      background: rgba(0,212,255,0.15);
      color: var(--accent);
      border-radius: 10px;
      padding: 1px 8px;
      font-size: 11px;
    }
    /* toggle button */
    .toggle-q-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 2px 10px;
      font-size: 11px;
      cursor: pointer;
      font-family: 'Tajawal', sans-serif;
      margin-right: auto;
      transition: all 0.2s;
    }
    .toggle-q-btn:hover { border-color: var(--accent2); color: var(--text); }
    .questions-list { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
    .q-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 12px 14px;
      transition: border-color 0.2s;
    }
    .q-card:hover { border-color: rgba(124,58,237,0.4); }
    .q-num {
      font-size: 10px;
      font-weight: 700;
      color: var(--accent2);
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .q-text {
      font-size: 14px;
      color: #d8e8ff;
      line-height: 1.8;
      font-family: 'Cairo', sans-serif;
      margin-bottom: 10px;
    }
    .opts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .opt-item {
      display: flex;
      align-items: center;
      gap: 7px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 7px;
      padding: 6px 10px;
      font-size: 13px;
      color: #aabbd4;
      font-family: 'Cairo', sans-serif;
      line-height: 1.5;
    }
    .opt-item.correct {
      background: rgba(16,185,129,0.12);
      border-color: rgba(16,185,129,0.35);
      color: #6ee7b7;
    }
    .opt-letter {
      font-size: 10px;
      font-weight: 900;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: rgba(255,255,255,0.07);
      color: var(--muted);
    }
    .opt-item.correct .opt-letter {
      background: rgba(16,185,129,0.3);
      color: #6ee7b7;
    }
    .questions-text {
      font-size: 14px;
      color: #c8d8f0;
      line-height: 1.7;
      font-family: 'Cairo', sans-serif;
      white-space: pre-wrap;
    }

    /* Students */
    .room-students { padding: 14px 18px; }
    .students-label {
      font-size: 11px;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 1.5px;
      margin-bottom: 10px;
    }
    .students-list { display: flex; flex-direction: column; gap: 8px; }
    .student-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 8px 12px;
      transition: background 0.2s;
    }
    .student-row:hover { background: rgba(0, 212, 255, 0.05); }
    .student-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .student-score {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 15px;
      font-weight: 900;
      color: var(--accent3);
    }
    .score-icon { font-size: 14px; }

    .student-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    /* Date badge */
    .date-badge {
      background: rgba(245, 158, 11, 0.12);
      border: 1px solid rgba(245, 158, 11, 0.25);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 11px;
      color: var(--accent3);
    }

    /* ===== LOADING / ERROR ===== */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      gap: 16px;
      color: var(--muted);
    }
    .loader {
      width: 48px;
      height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .error-state {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      color: #fca5a5;
      margin: 20px;
    }
    .empty-room {
      padding: 16px 18px;
      color: var(--muted);
      font-size: 13px;
      font-style: italic;
    }

    .countdown { font-size: 12px; color: var(--accent); font-variant-numeric: tabular-nums; }
    /* ===== AUDIT CHECKBOX ===== */
    .audit-bar {
      padding: 12px 18px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .audit-label { display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
    .audit-label input[type="checkbox"] { display: none; }
    .audit-box {
      width: 22px; height: 22px;
      border: 2px solid var(--border);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      transition: all 0.2s;
      background: rgba(255,255,255,0.03);
      flex-shrink: 0;
    }
    .audit-label:hover .audit-box { border-color: var(--green); }
    .audit-label input:checked ~ .audit-box { background: var(--green); border-color: var(--green); }
    .audit-text { font-size: 13px; color: var(--muted); transition: color 0.2s; }
    .audit-label input:checked ~ .audit-box ~ .audit-text { color: var(--green); font-weight: 700; }
    .audit-timestamp { font-size: 11px; color: var(--muted); }
    .room-card.audited { border-color: rgba(16,185,129,0.5); }
    .room-card.audited .room-header { background: linear-gradient(135deg, #0a2a1f 0%, #0e3326 100%); }
    .stat-chip.green .value { color: var(--green); }
    .stat-chip.red   .value { color: #f87171; }

    @media (max-width: 600px) {
      .top-bar { padding: 14px 16px; flex-wrap: wrap; gap: 12px; }
      .stats-bar { padding: 14px 16px; }
      .main { padding: 16px; }
      .rooms-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="top-bar-title">
      <div class="pulse-dot"></div>
      <h1>🏫 لوحة مراقبة الغرف</h1>
    </div>
    <div class="meta-info">
      <span>آخر تحديث: <strong id="last-update" style="color:var(--text)">--:--</strong></span>
      <span class="countdown">تحديث خلال: <strong id="countdown">10</strong>ث</span>
      <button class="refresh-btn" onclick="loadData(true)" id="refreshBtn">🔄 تحديث</button>
    </div>
  </div>

  <!-- STATS BAR -->
  <div class="stats-bar">
    <div class="stat-chip">
      <span class="icon">🚪</span>
      <div class="info">
        <div class="label">إجمالي الغرف</div>
        <div class="value" id="stat-rooms">0</div>
      </div>
    </div>
    <div class="stat-chip">
      <span class="icon">👥</span>
      <div class="info">
        <div class="label">إجمالي الطلاب</div>
        <div class="value" id="stat-students">0</div>
      </div>
    </div>
    <div class="stat-chip">
      <span class="icon">⭐</span>
      <div class="info">
        <div class="label">أعلى نقاط</div>
        <div class="value" id="stat-top">0</div>
      </div>
    </div>
    <div class="stat-chip">
      <span class="icon">📊</span>
      <div class="info">
        <div class="label">متوسط النقاط</div>
        <div class="value" id="stat-avg">0</div>
      </div>
    </div>
    <div class="stat-chip green">
      <span class="icon">✅</span>
      <div class="info">
        <div class="label">غرف مدققة</div>
        <div class="value" id="stat-audited">0</div>
      </div>
    </div>
    <div class="stat-chip red">
      <span class="icon">⏳</span>
      <div class="info">
        <div class="label">غير مدققة</div>
        <div class="value" id="stat-not-audited">0</div>
      </div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main" id="main">
    <div class="loading-state" id="loadingState">
      <div class="loader"></div>
      <div>جاري تحميل البيانات...</div>
    </div>
    <div id="errorState" class="error-state" style="display:none"></div>
    <div id="roomsContainer" style="display:none">
      <div class="section-title">🚪 الغرف والمشاركين</div>
      <div class="rooms-grid" id="roomsGrid"></div>
    </div>
  </div>

<script>
  const SHEET_ID = "1M-LkkAoNarQDN6_Hbb5ZGhs4vuD5cfhREKpZE-48_tg";
  let countdownVal = 10;
  let countdownInterval;

  // Check if a string contains an emoji
  function hasEmoji(str) {
    const emojiRegex = /[\u{1F300}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{1F000}-\u{1F02F}\u{1F0A0}-\u{1F0FF}\u{1F100}-\u{1F1FF}\u{1F200}-\u{1F2FF}\u{1F004}\u{1F0CF}]/u;
    return emojiRegex.test(str);
  }

  // Check if a value is purely a number (room number)
  function isRoomNumber(val) {
    if (val === null || val === undefined || val === '') return false;
    const str = String(val).trim();
    return /^\d+$/.test(str);
  }

  function formatDate(val) {
    if (!val) return null;
    try {
      if (typeof val === 'string' && val.startsWith('Date(')) {
        const parts = val.slice(5, -1).split(',').map(Number);
        const d = new Date(parts[0], parts[1], parts[2], parts[3] || 0, parts[4] || 0);
        return d.toLocaleDateString('ar-SA', { year: 'numeric', month: 'short', day: 'numeric' });
      }
      const d = new Date(val);
      if (!isNaN(d)) return d.toLocaleDateString('ar-SA', { year: 'numeric', month: 'short', day: 'numeric' });
    } catch(e) {}
    return String(val);
  }

  // Audit state persisted in memory
  const auditStates = {};

  function updateAuditStats() {
    const total = document.querySelectorAll('.room-card').length;
    const audited = Object.values(auditStates).filter(Boolean).length;
    document.getElementById('stat-audited').textContent = audited;
    document.getElementById('stat-not-audited').textContent = total - audited;
  }

  function toggleAudit(roomId, checkboxId, tsId) {
    const cb = document.getElementById(checkboxId);
    const card = document.getElementById('card-' + roomId);
    const ts = document.getElementById(tsId);
    auditStates[roomId] = cb.checked;
    if (cb.checked) {
      card.classList.add('audited');
      const now = new Date().toLocaleTimeString('ar-SA');
      ts.textContent = 'تم التدقيق ' + now;
    } else {
      card.classList.remove('audited');
      ts.textContent = '';
    }
    updateAuditStats();
  }

  async function loadData(manual = false) {
    const loading = document.getElementById('loadingState');
    const errorState = document.getElementById('errorState');
    const roomsContainer = document.getElementById('roomsContainer');

    if (manual) {
      const btn = document.getElementById('refreshBtn');
      btn.style.animation = 'spin 1s linear infinite';
      setTimeout(() => btn.style.animation = '', 1200);
    }

    try {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
      const response = await fetch(url);
      const text = await response.text();
      const json = JSON.parse(text.substring(47, text.length - 2));
      const allRows = json.table.rows;

      if (!allRows || allRows.length === 0) {
        throw new Error('لا توجد بيانات في الجدول');
      }

      // Start from row index 19 (row 20 in spreadsheet, 0-indexed)
      const rows = allRows.slice(19);

      // Parse rows into rooms structure
      // Logic:
      // - If col[0] is a number → new room starts (roomNumber = col[0], questions = col[1])
      // - If col[0] has emoji/name text → student entry (name = col[0], score = col[1], date = col[2] if exists)
      const rooms = [];
      let currentRoom = null;

      rows.forEach(row => {
        const col0 = row.c[0] ? (row.c[0].v !== null && row.c[0].v !== undefined ? String(row.c[0].v).trim() : '') : '';
        const col1 = row.c[1] ? (row.c[1].v !== null ? row.c[1].v : '') : '';
        const col2 = row.c[2] ? (row.c[2].v !== null ? row.c[2].v : null) : null;
        const col3 = row.c[3] ? (row.c[3].v !== null ? row.c[3].v : null) : null;

        if (!col0) return; // skip empty rows

        if (isRoomNumber(col0)) {
          // New room
          currentRoom = {
            number: col0,
            questions: col1 ? String(col1) : '',
            students: []
          };
          rooms.push(currentRoom);
        } else if ((hasEmoji(col0) || col0.length > 1) && currentRoom) {
          // Student entry
          // Try to find score: could be col1 (number)
          let score = col1;
          let date = col2 || col3;

          // If col1 is text (questions from another row), it's unusual — treat col1 as score
          currentRoom.students.push({
            name: col0,
            score: score !== '' ? score : null,
            date: date
          });
        } else if (col0.length >= 1 && currentRoom) {
          // Could still be a student name without emoji
          currentRoom.students.push({
            name: col0,
            score: col1 !== '' ? col1 : null,
            date: col2 || col3
          });
        }
      });

      // Compute stats
      const totalStudents = rooms.reduce((s, r) => s + r.students.length, 0);
      const allScores = rooms.flatMap(r => r.students.map(s => Number(s.score) || 0)).filter(s => s > 0);
      const topScore = allScores.length ? Math.max(...allScores) : 0;
      const avgScore = allScores.length ? Math.round(allScores.reduce((a, b) => a + b, 0) / allScores.length) : 0;

      document.getElementById('stat-rooms').textContent = rooms.length;
      document.getElementById('stat-students').textContent = totalStudents;
      document.getElementById('stat-top').textContent = topScore;
      document.getElementById('stat-avg').textContent = avgScore;

      // Render rooms
      const grid = document.getElementById('roomsGrid');
      grid.innerHTML = '';

      if (rooms.length === 0) {
        grid.innerHTML = '<div style="color:var(--muted);padding:40px;text-align:center;">لم يتم العثور على بيانات غرف من السطر 20</div>';
      } else {
        rooms.forEach((room, i) => {
          const card = buildRoomCard(room, i);
          grid.appendChild(card);
        });
      }

      loading.style.display = 'none';
      errorState.style.display = 'none';
      roomsContainer.style.display = 'block';
      document.getElementById('last-update').textContent = new Date().toLocaleTimeString('ar-SA');
      updateAuditStats();

      resetCountdown();

    } catch (err) {
      loading.style.display = 'none';
      errorState.style.display = 'block';
      errorState.textContent = '⚠️ خطأ في تحميل البيانات: ' + err.message;
    }
  }

  function parseQuestions(raw) {
    if (!raw) return null;
    const str = String(raw).trim();
    if (!str.startsWith('[') && !str.startsWith('{')) return null;
    try {
      const parsed = JSON.parse(str);
      return Array.isArray(parsed) ? parsed : [parsed];
    } catch(e) { return null; }
  }

  const LETTERS = ['أ', 'ب', 'ج', 'د'];

  function buildQuestionsHTML(raw, roomId) {
    const qs = parseQuestions(raw);
    if (!qs) {
      // fallback: plain text
      return raw ? `<div class="room-questions"><div class="questions-label">📋 الأسئلة</div><div class="questions-text">${raw}</div></div>` : '';
    }

    const listId = 'qlist-' + roomId;
    const btnId  = 'qbtn-'  + roomId;

    const cardsHTML = qs.map((q, i) => {
      const optsHTML = (q.opts || []).map((opt, oi) => {
        const isCorrect = (q.ans === oi);
        return `<div class="opt-item${isCorrect ? ' correct' : ''}">
          <span class="opt-letter">${LETTERS[oi] || (oi+1)}</span>
          <span>${opt}</span>
        </div>`;
      }).join('');

      return `<div class="q-card">
        <div class="q-num">السؤال ${i + 1}</div>
        <div class="q-text">${q.q || ''}</div>
        ${optsHTML ? `<div class="opts-grid">${optsHTML}</div>` : ''}
      </div>`;
    }).join('');

    return `
      <div class="room-questions">
        <div class="questions-label" style="display:flex;align-items:center;gap:8px;">
          📋 الأسئلة
          <span class="q-count">${qs.length} سؤال</span>
          <button class="toggle-q-btn" id="${btnId}" onclick="toggleQuestions('${listId}','${btnId}')">عرض ◀</button>
        </div>
        <div class="questions-list" id="${listId}" style="display:none;">${cardsHTML}</div>
      </div>`;
  }

  function toggleQuestions(listId, btnId) {
    const list = document.getElementById(listId);
    const btn  = document.getElementById(btnId);
    if (!list) return;
    const hidden = list.style.display === 'none';
    list.style.display = hidden ? 'flex' : 'none';
    btn.textContent = hidden ? 'إخفاء ▼' : 'عرض ◀';
    if (hidden && window.MathJax) {
      MathJax.typesetPromise([list]).catch(e => console.warn(e));
    }
  }

  function buildRoomCard(room, idx) {
    const card = document.createElement('div');
    card.className = 'room-card';
    card.id = 'card-room-' + idx;
    card.style.animationDelay = (idx * 0.06) + 's';

    const roomId = 'room-' + idx;

    // Sort students by score desc
    const sorted = [...room.students].sort((a, b) => (Number(b.score) || 0) - (Number(a.score) || 0));

    const studentsHTML = sorted.length > 0
      ? sorted.map((s, i) => {
          const score = s.score !== null ? Number(s.score) : null;
          const dateStr = formatDate(s.date);
          const medal = i === 0 && score !== null ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '';
          return `
            <div class="student-row">
              <div>
                <div class="student-name">${s.name}</div>
                ${dateStr ? `<div class="student-meta"><span class="date-badge">📅 ${dateStr}</span></div>` : ''}
              </div>
              <div class="student-score">
                ${medal ? `<span>${medal}</span>` : ''}
                ${score !== null ? `<span>${score}</span><span class="score-icon">⭐</span>` : '<span style="color:var(--muted);font-size:12px">—</span>'}
              </div>
            </div>
          `;
        }).join('')
      : '<div class="empty-room">لا يوجد طلاب مسجلون في هذه الغرفة</div>';

    const stuListId = 'stulist-' + roomId;
    const stuBtnId  = 'stubtn-'  + roomId;

    card.innerHTML = `
      <div class="room-header">
        <div class="room-number">
          <div class="room-badge">${room.number}</div>
          <div class="room-label">رقم الغرفة</div>
        </div>
        <div class="student-count-badge">👤 ${room.students.length} طالب</div>
      </div>
      ${buildQuestionsHTML(room.questions, roomId)}
      <div class="room-students">
        <div class="students-label" style="display:flex;align-items:center;gap:8px;">
          👥 الطلاب المشاركون
          <span class="q-count">${room.students.length}</span>
          <button class="toggle-q-btn" id="${stuBtnId}" onclick="toggleQuestions('${stuListId}','${stuBtnId}')">عرض ◀</button>
        </div>
        <div class="students-list" id="${stuListId}" style="display:none;">${studentsHTML}</div>
      </div>
      <div class="audit-bar">
        <label class="audit-label">
          <input type="checkbox" id="chk-${roomId}" onchange="toggleAudit('${roomId}','chk-${roomId}','ts-${roomId}')">
          <span class="audit-box">✓</span>
          <span class="audit-text">تم التدقيق</span>
        </label>
        <span class="audit-timestamp" id="ts-${roomId}"></span>
      </div>
    `;

    return card;
  }

  function resetCountdown() {
    countdownVal = 10;
    document.getElementById('countdown').textContent = countdownVal;
    clearInterval(countdownInterval);
    countdownInterval = setInterval(() => {
      countdownVal--;
      document.getElementById('countdown').textContent = countdownVal;
      if (countdownVal <= 0) {
        loadData();
      }
    }, 1000);
  }

  // Initial load
  loadData();
</script>
</body>
</html>
